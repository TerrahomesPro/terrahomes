<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Real Estate CRM</title>
<style>
:root {
  --bg:#fff; --bg2:#f8f8f8; --bg3:#f0f0f0;
  --surface:#fff; --border:#e5e5e5; --border2:#ccc;
  --text:#111; --text2:#555; --text3:#999;
  --gold:#c9a96e; --gold2:#f0e4cc;
  --ok:#16a34a; --warn:#d97706; --err:#dc2626; --inf:#2563eb;
  --r:10px; --r2:6px;
  --sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.1),0 12px 40px rgba(0,0,0,.08);
  --sb:240px; --tb:56px;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --t:.18s ease;
}
[data-theme=dark]{
  --bg:#0f0f0f; --bg2:#181818; --bg3:#222;
  --surface:#1a1a1a; --border:#2a2a2a; --border2:#3a3a3a;
  --text:#f0f0f0; --text2:#aaa; --text3:#666;
  --sh:0 1px 4px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
  --sh2:0 4px 12px rgba(0,0,0,.4),0 12px 40px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--t),color var(--t)}

/* LOGIN */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg2);padding:20px}
.lbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:var(--sh2)}
.l-logo{text-align:center;margin-bottom:28px}
.l-logo img{max-height:56px;max-width:200px;object-fit:contain}
.l-logo-txt{font-size:22px;font-weight:700;letter-spacing:-.5px}
.l-logo-txt span{color:var(--gold)}
.l-sub{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.l-err{color:var(--err);font-size:12px;text-align:center;margin-top:10px;display:none}

/* FIELDS */
.f{margin-bottom:14px}
.f label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.f input,.f select,.f textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r2);font-family:var(--f);font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color var(--t);-webkit-appearance:none}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--gold)}
.f input::placeholder{color:var(--text3)}
.btn-login{width:100%;padding:12px;background:var(--text);color:var(--bg);border:none;border-radius:var(--r2);font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity var(--t)}
.btn-login:hover{opacity:.85}

/* APP */
#app{display:none}
.layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sb{width:var(--sb);background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:200;transition:transform var(--t);overflow-y:auto}
.sb-logo{padding:16px;border-bottom:1px solid var(--border);cursor:pointer;text-align:center;position:relative}
.sb-logo img{max-height:44px;max-width:180px;object-fit:contain}
.sb-logo-txt{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.sb-logo-txt span{color:var(--gold)}
.sb-logo-hint{font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.sb-user{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;overflow:hidden;background:var(--gold)}
.sb-av img{width:100%;height:100%;object-fit:cover}
.sb-uname{font-size:13px;font-weight:600;color:var(--text)}
.sb-urole{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.sb-nav{flex:1;padding:6px 0}
.sb-sec{padding:8px 14px 2px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 14px;color:var(--text2);cursor:pointer;transition:all var(--t);font-size:13px;font-weight:500;margin:1px 6px;border-radius:var(--r2);position:relative}
.sb-item:hover{background:var(--bg2);color:var(--text)}
.sb-item.active{background:var(--bg2);color:var(--text);font-weight:600}
.sb-item.active::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);width:3px;height:14px;background:var(--gold);border-radius:2px}
.sb-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center}
.sb-foot{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px}
.sb-btn{flex:1;padding:7px;background:none;border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:4px;transition:all var(--t)}
.sb-btn:hover{background:var(--bg2);color:var(--text)}

/* MAIN */
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:var(--tb);background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-title{font-size:16px;font-weight:700}
.tb-right{display:flex;align-items:center;gap:8px}
.content{padding:20px}
.hamburger{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px;margin-right:4px}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--r2);font-family:var(--f);font-size:13px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all var(--t);white-space:nowrap}
.btn-dark{background:var(--text);color:var(--bg)}
.btn-dark:hover{opacity:.8}
.btn-out{background:none;border:1.5px solid var(--border);color:var(--text2)}
.btn-out:hover{border-color:var(--border2);color:var(--text);background:var(--bg2)}
.btn-ghost{background:none;color:var(--text2)}
.btn-ghost:hover{background:var(--bg2);color:var(--text)}
.btn-err{background:rgba(220,38,38,.1);color:var(--err);border:1px solid rgba(220,38,38,.2)}
.btn-err:hover{background:rgba(220,38,38,.2)}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{opacity:.9}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px;width:30px;height:30px;justify-content:center}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.stat-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:30px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px}

/* CHARTS */
.charts{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.chart{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.chart-ttl{font-size:13px;font-weight:700;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;cursor:pointer}
.bar-lbl{font-size:12px;color:var(--text2);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-trk{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .8s ease}
.bar-cnt{font-size:12px;font-weight:600;color:var(--text2);width:20px;text-align:right}
.agents-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.agent-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:all var(--t)}
.agent-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--sh)}
.agent-cnt{font-size:26px;font-weight:700;color:var(--gold)}
.agent-name{font-size:11px;color:var(--text2);margin-top:3px}

/* LIST */
.list-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.list-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.list-ttl{font-size:15px;font-weight:700}
.list-cnt{font-size:13px;color:var(--text3)}
.srch{position:relative}
.srch input{padding:7px 10px 7px 30px;border:1.5px solid var(--border);border-radius:var(--r2);font-size:13px;background:var(--bg2);color:var(--text);outline:none;width:200px;font-family:var(--f)}
.srch input:focus{border-color:var(--gold)}
.srch-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.fltrs{padding:8px 18px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;background:var(--bg2)}
.fsel{padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--r2);font-size:12px;background:var(--surface);color:var(--text);outline:none;cursor:pointer;font-family:var(--f)}
.fsel:focus{border-color:var(--gold)}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--bg2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2);cursor:pointer}
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;white-space:nowrap}
.b-green{background:rgba(22,163,74,.1);color:#16a34a}
.b-gold{background:rgba(201,169,110,.15);color:#a07840}
.b-gray{background:var(--bg3);color:var(--text3)}
.b-red{background:rgba(220,38,38,.1);color:var(--err)}
.b-blue{background:rgba(37,99,235,.1);color:var(--inf)}
.b-orange{background:rgba(217,119,6,.1);color:var(--warn)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:700px;box-shadow:var(--sh2);animation:mIn .22s ease;margin:auto}
@keyframes mIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.m-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);border-radius:16px 16px 0 0;z-index:1}
.m-ttl{font-size:16px;font-weight:700}
.m-close{width:26px;height:26px;border-radius:50%;border:none;background:var(--bg2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.m-close:hover{background:var(--bg3)}
.m-body{padding:18px 22px;max-height:72vh;overflow-y:auto}
.m-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface);border-radius:0 0 16px 16px}

/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fspan{grid-column:1/-1}
.modal .f input,.modal .f select,.modal .f textarea{background:var(--bg2);border:1.5px solid var(--border);color:var(--text)}
.modal .f input:focus,.modal .f select:focus,.modal .f textarea:focus{border-color:var(--gold);background:var(--bg)}

/* CUSTOM CHECKBOX */
.ck-wrap{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;user-select:none;transition:all var(--t)}
.ck-wrap:hover{border-color:var(--gold)}
.ck-wrap.on{border-color:var(--gold);background:rgba(201,169,110,.08)}
.ck-box{width:18px;height:18px;border:2px solid var(--border2);border-radius:3px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t);font-size:11px;font-weight:700}
.ck-wrap.on .ck-box{background:var(--gold);border-color:var(--gold);color:#fff}
.ck-lbl{font-size:13px;color:var(--text)}

/* MULTISELECT */
.ms{position:relative}
.ms-display{border:1.5px solid var(--border);border-radius:var(--r2);background:var(--bg2);padding:6px 10px;min-height:38px;cursor:pointer;display:flex;flex-wrap:wrap;gap:4px;align-items:center;transition:border-color var(--t)}
.ms-display:hover,.ms-display.open{border-color:var(--gold)}
.ms-tag{background:var(--gold2);color:#8a6030;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:3px}
.ms-tag button{background:none;border:none;cursor:pointer;color:#8a6030;font-size:12px;padding:0;line-height:1;flex-shrink:0}
.ms-placeholder{font-size:12px;color:var(--text3)}
.ms-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh2);z-index:500;max-height:220px;overflow-y:auto}
.ms-dropdown.open{display:block}
.ms-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px;transition:background var(--t)}
.ms-opt:hover{background:var(--bg2)}
.ms-opt.ms-sel{background:rgba(201,169,110,0.1);font-weight:500}
.ms-opt.ms-sel input[type=checkbox]{accent-color:var(--gold)}
.ms-opt input[type=checkbox]{width:15px;height:15px;accent-color:var(--gold);flex-shrink:0;cursor:pointer}
.ms-add-row{padding:6px 10px;border-top:1px solid var(--border);display:flex;gap:6px}
.ms-add-row input{flex:1;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg);color:var(--text);outline:none;font-family:var(--f)}
.ms-add-row button{padding:4px 10px;background:var(--gold);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}

/* DETAIL VIEW */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.di{padding:9px 12px;background:var(--bg2);border-radius:var(--r2)}
.di-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.di-val{font-size:13px;font-weight:500;color:var(--text)}

/* SCORE CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:all var(--t)}
.sc:hover{box-shadow:var(--sh2);transform:translateY(-2px);border-color:var(--border2)}
.sc-head{padding:14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.sc-circle{width:50px;height:50px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;border:2px solid}
.s100,.s90{border-color:#16a34a;color:#16a34a;background:rgba(22,163,74,.08)}
.s80{border-color:var(--inf);color:var(--inf);background:rgba(37,99,235,.06)}
.s70{border-color:var(--warn);color:var(--warn);background:rgba(217,119,6,.06)}
.s60{border-color:var(--err);color:var(--err);background:rgba(220,38,38,.06)}
.sc-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.5px}
.sc-info{flex:1;padding-right:10px}
.sc-per{font-size:15px;font-weight:700}
.sc-eid{font-size:12px;color:var(--text2);margin-top:2px}
.sc-body{padding:12px 14px}
.sc-timi{font-size:18px;font-weight:700;color:var(--gold);margin-bottom:10px}
.sc-dets{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.sc-dl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.sc-dv{font-size:12px;font-weight:600}
.prog{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 1s ease}
.sc-foot{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:6px;background:var(--bg2)}

/* TOAST */
.toasts{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 14px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:var(--sh2);animation:tIn .25s ease;display:flex;align-items:center;gap:8px;max-width:280px}
.t-s{background:#16a34a;color:#fff}
.t-e{background:var(--err);color:#fff}
.t-i{background:var(--text);color:var(--bg)}
@keyframes tIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}

/* LOADER */
.loader{position:fixed;inset:0;background:rgba(255,255,255,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998}
[data-theme=dark] .loader{background:rgba(0,0,0,.88)}
.spin{width:30px;height:30px;border:2.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-ic{font-size:36px;margin-bottom:10px;opacity:.4}
.empty-tx{font-size:14px;font-weight:500;margin-bottom:3px}

/* MOBILE */
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
.sb-ov.open{display:block}
@media(max-width:768px){
  .sb{transform:translateX(-100%)}
  .sb.open{transform:translateX(0);box-shadow:var(--sh2)}
  .main{margin-left:0}
  .hamburger{display:flex}
  .content{padding:14px}
  .stats{grid-template-columns:1fr 1fr;gap:10px}
  .charts{grid-template-columns:1fr}
  .fg{grid-template-columns:1fr}
  .dg{grid-template-columns:1fr}
  .sg{grid-template-columns:1fr}
  .topbar{padding:0 14px}
  .srch input{width:160px}
  td,th{padding:9px 10px}
}
@media(max-width:480px){
  .stat-val{font-size:24px}
  .lbox{padding:24px 18px}
}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spin"></div>
  <p style="margin-top:10px;font-size:12px;color:var(--text3)">Φόρτωση...</p>
</div>

<div class="toasts" id="toasts"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="m-head">
      <div class="m-ttl" id="mTtl"></div>
      <button class="m-close" onclick="CM()">✕</button>
    </div>
    <div class="m-body" id="mBody"></div>
    <div class="m-foot" id="mFoot"></div>
  </div>
</div>

<div class="sb-ov" id="sbOv" onclick="closeSB()"></div>

<!-- LOGIN -->
<div id="loginPage">
  <div class="lbox">
    <div class="l-logo">
      <div id="loginLogo">
        <div class="l-logo-txt">Real<span>Estate</span></div>
        <div class="l-sub">CRM Platform</div>
      </div>
    </div>
    <div class="f"><label>Airtable Token</label><input type="password" id="lTok" placeholder="patXXXX.YYYY" autocomplete="off"></div>
    <div class="f"><label>Email</label><input type="email" id="lEmail" placeholder="email@example.com"></div>
    <div class="f"><label>Κωδικός</label><input type="password" id="lPass" placeholder="••••••••"></div>
    <button class="btn-login" onclick="doLogin()">Σύνδεση →</button>
    <div class="l-err" id="lErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">
    <nav class="sb" id="sb">
      <div class="sb-logo" onclick="triggerLogo()" title="Κλικ για αλλαγή logo">
        <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="handleLogo(this)">
        <div id="sbLogo">
          <div class="sb-logo-txt">Real<span>Estate</span></div>
          <div class="sb-logo-hint">κλικ για logo</div>
        </div>
      </div>

<script charset="utf-8">
// ── CONFIG ────────────────────────────────────────────────────
const C = {
  BASE: 'app3fUC1uIoQsX2DP',
  TOKEN: '',
  T: { AK:'ΑΚΙΝΗΤΑ', ZI:'Ζητήσεις', MA:'Matching Σκορ', US:'USERS', KA:'ΚΑΤΑΣΚΕΥΑΣΤΕΣ' }
};

let ME = null;
let DB = { ak:[], zi:[], ma:[], us:[], ka:[] };
let PAGE = 'home';

// ── API ───────────────────────────────────────────────────────
async function apiCall(table, method='GET', body=null, id=null) {
  const url = id
    ? `https://api.airtable.com/v0/${C.BASE}/${encodeURIComponent(table)}/${id}`
    : `https://api.airtable.com/v0/${C.BASE}/${encodeURIComponent(table)}`;
  const opts = { method, headers: { 'Authorization': `Bearer ${C.TOKEN}`, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) { const e = await r.json(); throw new Error(JSON.stringify(e.error || e)); }
  return r.json();
}

async function getAll(table, filter='') {
  let recs = [], offset = null;
  do {
    let url = `https://api.airtable.com/v0/${C.BASE}/${encodeURIComponent(table)}?pageSize=100`;
    if (filter) url += `&filterByFormula=${encodeURIComponent(filter)}`;
    if (offset) url += `&offset=${offset}`;
    const r = await fetch(url, { headers: { 'Authorization': `Bearer ${C.TOKEN}` } });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    recs = recs.concat(d.records || []);
    offset = d.offset;
  } while (offset);
  return recs;
}

const createR = (t, f) => apiCall(t, 'POST', { fields: f });
const updateR = (t, id, f) => apiCall(t, 'PATCH', { fields: f }, id);
const deleteR = (t, id) => apiCall(t, 'DELETE', null, id);

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin() {
  const token = document.getElementById('lTok').value.trim();
  const email = document.getElementById('lEmail').value.trim().toLowerCase();
  const pass = document.getElementById('lPass').value.trim();
  if (!token || !email || !pass) { lErr('Συμπλήρωσε όλα τα πεδία'); return; }
  C.TOKEN = token;
  load(true);
  try {
    const users = await getAll(C.T.US);
    const u = users.find(x => (x.fields['Email']||'').toLowerCase().trim() === email);
    if (!u) { lErr('Δεν βρέθηκε χρήστης'); load(false); return; }
    if (u.fields['Password'] !== pass) { lErr('Λανθασμένος κωδικός'); load(false); return; }
    ME = { id: u.id, name: u.fields['Name'] || email, email, role: (u.fields['Role']||'agent').toLowerCase(), photo: u.fields['Photo'] };
    localStorage.setItem('crm_u', JSON.stringify(ME));
    localStorage.setItem('crm_t', token);
    await boot();
  } catch(e) { console.error(e); lErr('Σφάλμα σύνδεσης. Έλεγξε το token.'); }
  load(false);
}

function lErr(m) { const e = document.getElementById('lErr'); e.textContent = m; e.style.display = 'block'; }

function doLogout() {
  ME = null;
  localStorage.removeItem('crm_u');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── INIT ──────────────────────────────────────────────────────
async function boot() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('sbName').textContent = ME.name;
  document.getElementById('sbRole').textContent = ME.role.toUpperCase();

  // Agent photo in avatar
  const avEl = document.getElementById('sbAv');
  if (ME.photo && Array.isArray(ME.photo) && ME.photo[0]) {
    avEl.innerHTML = `<img src="${ME.photo[0].url}" alt="${ME.name}">`;
  } else {
    avEl.textContent = ME.name.charAt(0).toUpperCase();
  }

  if (ME.role !== 'admin') document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'none');
  loadTheme(); loadLogo();
  load(true); await loadAll(); load(false);
  goP('home', document.querySelector('.sb-item[data-p="home"]'));
}

async function loadAll() {
  try {
    const [ak, zi, ma, us, ka] = await Promise.all([
      getAll(C.T.AK), getAll(C.T.ZI), getAll(C.T.MA), getAll(C.T.US), getAll(C.T.KA)
    ]);
    DB.ak = ak; DB.zi = zi; DB.us = us; DB.ka = ka;
    DB.ma = ME.role === 'admin' ? ma : ma.filter(r =>
      (r.fields['User Ζήτησης']||'').toLowerCase() === ME.email.toLowerCase()
    );
    document.getElementById('mBadge').textContent = DB.ma.length;
  } catch(e) { toast('Σφάλμα φόρτωσης','e'); console.error(e); }
}

async function doRefresh() {
  load(true); await loadAll(); load(false);
  goP(PAGE, document.querySelector(`.sb-item[data-p="${PAGE}"]`));
  toast('Ανανεώθηκε!');
}

// ── NAVIGATION ────────────────────────────────────────────────
function goP(p, el) {
  PAGE = p;
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  const titles = { home:'Αρχική', ak:'Ακίνητα', zi:'Ζητήσεις', ma:'Matching', ka:'Κατασκευαστές', us:'Χρήστες' };
  document.getElementById('pgTitle').textContent = titles[p] || p;
  const C2 = document.getElementById('pgContent');
  const A = document.getElementById('tbRight');
  const pages = { home: pgHome, ak: pgAk, zi: pgZi, ma: pgMa, ka: pgKa, us: pgUs };
  if (pages[p]) pages[p](C2, A);
  closeSB();
}

// ── HELPERS ───────────────────────────────────────────────────
function getUser(id) { return DB.us.find(u => u.id === id); }
function getAgentName(fields) {
  const uid = Array.isArray(fields['User']) ? fields['User'][0] : (Array.isArray(fields['USER']) ? fields['USER'][0] : null);
  const u = uid ? getUser(uid) : null;
  return u ? (u.fields['Name'] || '') : '-';
}
function fmtEuro(v) { if(!v) return '-'; return String.fromCharCode(8364) + Number(v).toLocaleString('el-GR'); }
function fmtDate(v) { if(!v) return '-'; return new Date(v).toLocaleDateString('el-GR'); }
function arrVal(v) {
  if (!v) return '-';
  if (Array.isArray(v)) return v.map(x => typeof x === 'object' ? x.name || x : x).join(', ');
  return String(v);
}
function myAk() {
  return ME.role === 'admin' ? DB.ak : DB.ak.filter(r => Array.isArray(r.fields['User']) && r.fields['User'].includes(ME.id));
}
function myZi() {
  return ME.role === 'admin' ? DB.zi : DB.zi.filter(r => {
    const u = r.fields['USER'] || r.fields['User'];
    return Array.isArray(u) && u.includes(ME.id);
  });
}
function isOwnerAk(f) {
  return ME.role === 'admin' || (Array.isArray(f['User']) && f['User'].includes(ME.id));
}
function isOwnerZi(f) {
  const u = f['USER'] || f['User'];
  return ME.role === 'admin' || (Array.isArray(u) && u.includes(ME.id));
}
function uniq(arr) { return [...new Set(arr.filter(Boolean))]; }
function getOpts(field, tbl='ak') {
  return uniq(DB[tbl].map(r => {
    const v = r.fields[field];
    if (Array.isArray(v)) return v.map(x => typeof x === 'object' ? x.name || x : x);
    return v ? [v] : [];
  }).flat());
}

// ── HOME ──────────────────────────────────────────────────────

        ${Object.entries(byE).sort((a,b)=>b[1]-a[1]).slice(0,7).map(([k,v])=>`
          <div class="bar-row"><div class="bar-lbl">${k}</div>

function filterAk() {

  if(st) r=r.filter(x=>x.fields['Status']===st);
  if(ei) r=r.filter(x=>x.fields['Είδος ακινήτου']===ei);
  if(pe) r=r.filter(x=>x.fields['Περιοχή']===pe);
  renderAkRows(r);
}

function chkNew(sel) {
  if (sel.value !== '__new__') return;
  const v = prompt('Νέα επιλογή:');
  if (v && v.trim()) {
    const opt = new Option(v.trim(), v.trim(), true, true);
    sel.insertBefore(opt, sel.lastElementChild);
    sel.value = v.trim();
  } else { sel.value = ''; }
}

function calcTM() {
  const t = parseFloat(document.getElementById('a_ti')?.value)||0;
  const e = parseFloat(document.getElementById('a_em')?.value)||0;
  const el = document.getElementById('a_tm');
  if (el) el.value = (t>0&&e>0) ? (t/e).toLocaleString('el-GR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €/τ.μ.' : '';
}

function mkCk(id, lbl, checked) {
  return `<div class="ck-wrap${checked?' on':''}" id="ck_${id}" onclick="toggleCk('${id}')">
    <div class="ck-box">${checked?'✓':''}</div>
    <input type="checkbox" id="${id}" ${checked?'checked':''} style="display:none">
    <span class="ck-lbl">${lbl}</span>
  </div>`;
}

function toggleCk(id) {
  const wrap = document.getElementById('ck_'+id);
  const cb = document.getElementById(id);
  if (!wrap||!cb) return;
  const on = !wrap.classList.contains('on');
  wrap.classList.toggle('on', on);
  cb.checked = on;
  wrap.querySelector('.ck-box').textContent = on ? '✓' : '';
}

async function saveAk(id) {
  const uid = document.getElementById('a_us').value;
  const timi = parseFloat(document.getElementById('a_ti').value)||null;
  const emv = parseFloat(document.getElementById('a_em').value)||null;
  const fields = {
    'Ημερομηνία': document.getElementById('a_dt').value||null,
    'Περιοχή': document.getElementById('a_pe').value||null,
    'Είδος ακινήτου': document.getElementById('a_ei').value||null,
    'Status': document.getElementById('a_st').value||null,
    'Όροφος': document.getElementById('a_or').value||null,
    'Δωμάτια': document.getElementById('a_do').value||null,
    'Θέση Στάθμευσης': document.getElementById('a_sta').value||null,
    'Τιμή': timi,
    'Εκτίμηση': parseFloat(document.getElementById('a_ek').value)||null,
    'Εμβ. Μεικτό': emv,
    'Εμβαδό Καθαρό': parseFloat(document.getElementById('a_ek2').value)||null,
    'Έτος κατασκευής': parseInt(document.getElementById('a_et').value)||null,
    'Διεύθυνση': document.getElementById('a_di').value||null,
    'Συνεργασίες': document.getElementById('a_si').value||null,
    'Ασανσέρ': document.getElementById('a_as').checked,
    'Αποθήκη': document.getElementById('a_ap').checked,
    'Σημειώσεις': document.getElementById('a_no').value||null,
  };
  if (uid) fields['User'] = [uid];
  Object.keys(fields).forEach(k => { if (fields[k]===null||fields[k]==='') delete fields[k]; });
  load(true);
  try {
    if (id) { await updateR(C.T.AK,id,fields); toast('Αποθηκεύτηκε!','s'); }
    else { await createR(C.T.AK,fields); toast('Δημιουργήθηκε!','s'); }
    CM(); await loadAll(); pgAk(document.getElementById('pgContent'),document.getElementById('tbRight'));
  } catch(e) { console.error(e); toast('Σφάλμα: '+JSON.parse(e.message)?.message||e.message,'e'); }
  load(false);
}

async function delAk(id) {
  if (!confirm('Διαγραφή ακινήτου;')) return;
  load(true);
  try { await deleteR(C.T.AK,id); toast('Διαγράφηκε','s'); CM(); await loadAll(); pgAk(document.getElementById('pgContent'),document.getElementById('tbRight')); }
  catch(e) { toast('Σφάλμα','e'); }
  load(false);
}

    const f = r.fields;
    const pe = arrVal(f['Περιοχή']); const ei = arrVal(f['Είδος ακινήτου']);
    const tMin = f['Τιμή Min']?fmtEuro(f['Τιμή Min']):''; const tMax = f['Τιμή Max']?fmtEuro(f['Τιμή Max']):'';

// Live matching for a request
function findMatchingAk(zf) {
  const zPer = Array.isArray(zf['Περιοχή']) ? zf['Περιοχή'].map(x=>typeof x==='object'?x.name||x:x) : (zf['Περιοχή']?[zf['Περιοχή']]:[]);
  const zEi = Array.isArray(zf['Είδος ακινήτου']) ? zf['Είδος ακινήτου'].map(x=>typeof x==='object'?x.name||x:x) : (zf['Είδος ακινήτου']?[zf['Είδος ακινήτου']]:[]);
  const tMin = parseFloat(zf['Τιμή Min'])||0;
  const tMax = parseFloat(zf['Τιμή Max'])||999999999;
  return DB.ak.filter(r => {
    const f = r.fields;
    if (f['Status']!=='Διαθέσιμο' && f['Status']!=='Off Market') return false;
    const perMatch = zPer.length===0 || zPer.includes(f['Περιοχή']);
    const eiMatch = zEi.length===0 || zEi.includes(f['Είδος ακινήτου']);
    const timi = parseFloat(f['Τιμή'])||0;
    const timiMatch = tMin===0&&tMax===999999999 ? true : timi>=tMin&&timi<=tMax;
    return perMatch && eiMatch && timiMatch;
  });
}

function buildMS(id, opts, sel=[], allowNew=false) {
  const selArr = sel.map(x => typeof x==='object'?x.name||x:x);
  return `
    <div class="ms" id="ms_${id}">
      <div class="ms-display" id="msd_${id}" onclick="toggleMSD('${id}')">
        <div id="mst_${id}" style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;flex:1">
          ${selArr.map(v=>`<span class="ms-tag">${v}<button type="button" onclick="event.stopPropagation();rmTag('${id}','${v.replace(/'/g,"\\'")}')">×</button></span>`).join('')}
          ${!selArr.length?`<span class="ms-placeholder">Κλικ για επιλογή...</span>`:''}
        </div>
        <span style="color:var(--text3);font-size:10px;margin-left:4px">▼</span>
      </div>
      <div class="ms-dropdown" id="mso_${id}">
        ${opts.map(o=>`<div class="ms-opt ${selArr.includes(o)?'ms-sel':''}" onclick="event.stopPropagation();tgTag('${id}','${o.replace(/'/g,"\\'")}')">
          <input type="checkbox" ${selArr.includes(o)?'checked':''} onclick="event.stopPropagation();tgTag('${id}','${o.replace(/'/g,"\\'")}')"> ${o}
        </div>`).join('')}
        ${allowNew?`<div class="ms-add-row"><input type="text" id="msn_${id}" placeholder="Νέα επιλογή..." onclick="event.stopPropagation()"><button onclick="event.stopPropagation();addMSOpt('${id}')">+</button></div>`:''}
      </div>
      <input type="hidden" id="msv_${id}" value="${selArr.join('||')}">
    </div>`;
}

function toggleMSD(id) {
  const dd = document.getElementById('mso_'+id);
  const disp = document.getElementById('msd_'+id);
  if (!dd) return;
  const isOpen = dd.classList.contains('open');
  document.querySelectorAll('.ms-dropdown.open').forEach(el => { el.classList.remove('open'); document.getElementById('msd_'+el.id.replace('mso_',''))?.classList.remove('open'); });
  if (!isOpen) { dd.classList.add('open'); disp.classList.add('open'); }
}

function tgTag(id, val) {
  const hid = document.getElementById('msv_'+id); if(!hid) return;
  let vals = hid.value ? hid.value.split('||').filter(Boolean) : [];
  const idx = vals.indexOf(val);
  if (idx>=0) vals.splice(idx,1); else vals.push(val);
  hid.value = vals.join('||');
  refreshMSTags(id, vals);
  const dd = document.getElementById('mso_'+id);
  if (dd) dd.querySelectorAll('.ms-opt input[type=checkbox]').forEach(cb => {
    cb.checked = vals.includes(cb.parentElement.textContent.trim());
  });
}

function rmTag(id, val) { tgTag(id, val); }

function refreshMSTags(id, vals) {
  const tagsEl = document.getElementById('mst_'+id); if(!tagsEl) return;
  tagsEl.innerHTML = vals.map(v=>`<span class="ms-tag">${v}<button type="button" onclick="event.stopPropagation();rmTag('${id}','${v.replace(/'/g,"\\'")}')">×</button></span>`).join('') +
    (!vals.length?`<span class="ms-placeholder">Κλικ για επιλογή...</span>`:'');
}

function addMSOpt(id) {
  const inp = document.getElementById('msn_'+id); if(!inp||!inp.value.trim()) return;
  const val = inp.value.trim();
  const dd = document.getElementById('mso_'+id);
  const addRow = dd.querySelector('.ms-add-row');
  const newOpt = document.createElement('div');
  newOpt.className = 'ms-opt';
  newOpt.innerHTML = `<input type="checkbox"> ${val}`;
  newOpt.onclick = (e) => { e.stopPropagation(); tgTag(id, val); };
  newOpt.querySelector('input').onclick = (e) => { e.stopPropagation(); tgTag(id, val); };
  dd.insertBefore(newOpt, addRow);
  tgTag(id, val);
  inp.value = '';
}

function getMS(id) {
  const hid = document.getElementById('msv_'+id);
  if (!hid||!hid.value) return [];
  return hid.value.split('||').filter(Boolean);
}

function renderMaCards(recs) {
  const g = document.getElementById('maGrid'); if(!g) return;
  if (!recs.length) { g.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-ic">⭐</div><div class="empty-tx">Δεν βρέθηκαν αποτελέσματα</div></div>`; return; }
  g.innerHTML = recs.map(r => {
    const f=r.fields, sc=f['Σκορ %']||0;
    const cls = sc>=90?'s90':sc>=80?'s80':sc>=70?'s70':'s60';
    return `<div class="sc" onclick="viewMa('${r.id}')">
      <div class="sc-head">
        <div class="sc-info"><div class="sc-per">${f['ΠΕΡΙΟΧΗ']||f['Περιοχή']||'-'}</div><div class="sc-eid">${f['ΕΙΔΟΣ ΑΚΙΝΗΤΟΥ']||f['Είδος ακινήτου']||'-'}</div></div>
        <div class="sc-circle ${cls}"><span>${sc}%</span><span class="sc-lbl">match</span></div>
      </div>
      <div class="sc-body">
        <div class="sc-timi">${fmtEuro(f['Τιμή'])}</div>
        <div class="sc-dets">
          <div><div class="sc-dl">Εμβαδό</div><div class="sc-dv">${f['Εμβαδό']||f['Εμβ. Μεικτό']||'-'} τ.μ.</div></div>
          <div><div class="sc-dl">Δωμάτια</div><div class="sc-dv">${f['ΔΩΜΑΤΙΑ']||f['Δωμάτια']||'-'}</div></div>
          <div><div class="sc-dl">Έτος</div><div class="sc-dv">${f['ΕΤΟΣ ΚΑΤΑΣΚΕΥΗΣ']||f['Έτος κατασκευής']||'-'}</div></div>
          <div><div class="sc-dl">Στάθμευση</div><div class="sc-dv">${f['Θέση Στάθμευσης']||'-'}</div></div>
        </div>
        <div class="prog"><div class="prog-fill" style="width:${sc}%"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px">${fmtDate(f['Ημερομηνία Matching'])}</div>
      </div>
      <div class="sc-foot">
        <button class="btn btn-dark btn-sm" onclick="event.stopPropagation();viewMa('${r.id}')">🏢 Λεπτομέρειες</button>
        <button class="btn btn-out btn-sm" onclick="event.stopPropagation();printMa('${r.id}')">📄</button>
        <button class="btn btn-out btn-sm" onclick="event.stopPropagation();viberMa('${r.id}')">💬</button>
      </div>
    </div>`;
  }).join('');
}

function filterMa() {
  const s=(document.getElementById('maSrch')?.value||'').toLowerCase();
  const mn=parseInt(document.getElementById('maScore')?.value||'0')||0;
  let r=DB.ma.filter(x=>(x.fields['Σκορ %']||0)>=mn);
  if(s) r=r.filter(x=>JSON.stringify(x.fields).toLowerCase().includes(s));
  renderMaCards(r.sort((a,b)=>(b.fields['Σκορ %']||0)-(a.fields['Σκορ %']||0)));
}

function viewMa(id) {
  const ma=DB.ma.find(r=>r.id===id); if(!ma) return;
  const f=ma.fields, sc=f['Σκορ %']||0;
  const akId=Array.isArray(f['Ακίνητο ID'])?f['Ακίνητο ID'][0]:f['Ακίνητο ID'];
  const ak=DB.ak.find(r=>r.id===akId);
  const sf=ak?ak.fields:{};
  const getLU = k => { const v=f[k]; if(!v) return null; return Array.isArray(v)?v[0]:v; };
  const g = k => sf[k] || getLU(k+' (from Ακίνητο ID)') || f[k] || null;

  openModal('🏢 Matching Ακίνητο', `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div><div style="font-size:18px;font-weight:700">${g('Περιοχή')||f['ΠΕΡΙΟΧΗ']||'-'}</div><div style="color:var(--text2)">${g('Είδος ακινήτου')||f['ΕΙΔΟΣ ΑΚΙΝΗΤΟΥ']||'-'}</div></div>
      <div style="text-align:right"><div style="font-size:20px;font-weight:700;color:var(--gold)">${fmtEuro(g('Τιμή')||f['Τιμή'])}</div></div>
    </div>
    <div class="dg">
      ${[['Εμβαδό Μεικτό',(g('Εμβ. Μεικτό')||f['Εμβαδό'])&&((g('Εμβ. Μεικτό')||f['Εμβαδό'])+' τ.μ.')],
         ['Δωμάτια',g('Δωμάτια')||f['ΔΩΜΑΤΙΑ']],
         ['Έτος Κατ/σης',g('Έτος κατασκευής')||f['ΕΤΟΣ ΚΑΤΑΣΚΕΥΗΣ']],
         ['Όροφος',g('Όροφος')],
         ['Θέση Στάθμευσης',g('Θέση Στάθμευσης')||f['Θέση Στάθμευσης']],
         ['Ασανσέρ',(g('Ασανσέρ'))!=null?(g('Ασανσέρ')?'✅':'❌'):null],
         ['Αποθήκη',(g('Αποθήκη'))!=null?(g('Αποθήκη')?'✅':'❌'):null],
         ['Διεύθυνση',g('Διεύθυνση')],
         ['Status',g('Status')],
      ].filter(([,v])=>v).map(([k,v])=>`<div class="di"><div class="di-lbl">${k}</div><div class="di-val">${v}</div></div>`).join('')}
    </div>
    <div style="margin-top:14px;padding:12px;background:var(--bg2);border-radius:var(--r2)">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;color:var(--text2)">Matching Score</span><strong style="color:var(--gold)">${sc}%</strong></div>
      <div class="prog"><div class="prog-fill" style="width:${sc}%"></div></div>
    </div>
  `, `
    <button class="btn btn-out btn-sm" onclick="printMa('${id}')">📄 PDF</button>
    <button class="btn btn-out btn-sm" onclick="viberMa('${id}')">💬 Viber</button>
    <button class="btn btn-dark btn-sm" onclick="CM()">Κλείσιμο</button>
  `);
}

function printMa(id) {
  const ma=DB.ma.find(r=>r.id===id); if(!ma) return;
  const f=ma.fields;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Matching</title>
  <style>body{font-family:-apple-system,sans-serif;max-width:680px;margin:36px auto;color:#111;font-size:13px}h1{font-size:20px;margin-bottom:18px}table{width:100%;border-collapse:collapse}td{padding:7px 10px;border-bottom:1px solid #eee;font-size:12px}td:first-child{font-weight:600;color:#666;text-transform:uppercase;font-size:11px;width:38%}.score{background:#c9a96e;color:#fff;padding:4px 12px;border-radius:20px;font-weight:700}@media print{.noprint{display:none}}</style>
  </head><body>
  <h1>Matching Ακίνητο <span class="score">${f['Σκορ %']||0}%</span></h1>
  <table>
    <tr><td>Περιοχή</td><td>${f['ΠΕΡΙΟΧΗ']||f['Περιοχή']||'-'}</td></tr>
    <tr><td>Είδος</td><td>${f['ΕΙΔΟΣ ΑΚΙΝΗΤΟΥ']||f['Είδος ακινήτου']||'-'}</td></tr>
    <tr><td>Τιμή</td><td>${fmtEuro(f['Τιμή'])}</td></tr>
    <tr><td>Εμβαδό</td><td>${f['Εμβαδό']||f['Εμβ. Μεικτό']||'-'} τ.μ.</td></tr>
    <tr><td>Δωμάτια</td><td>${f['ΔΩΜΑΤΙΑ']||f['Δωμάτια']||'-'}</td></tr>
    <tr><td>Θέση Στάθμευσης</td><td>${f['Θέση Στάθμευσης']||'-'}</td></tr>
    <tr><td>Ημερομηνία Matching</td><td>${fmtDate(f['Ημερομηνία Matching'])}</td></tr>
  </table>
  <div style="margin-top:16px;font-size:11px;color:#999;border-top:1px solid #eee;padding-top:10px">Εκτυπώθηκε: ${new Date().toLocaleDateString('el-GR')}</div>
  <button class="noprint" onclick="window.print()" style="margin-top:14px;padding:9px 20px;background:#c9a96e;border:none;color:#fff;cursor:pointer;border-radius:6px">🖨️ Εκτύπωση / PDF</button>
  </body></html>`);
  w.document.close();
}

function viberMa(id) {
  const ma=DB.ma.find(r=>r.id===id); if(!ma) return;
  const f=ma.fields;
  window.open(`viber://forward?text=${encodeURIComponent(`Matching Ακίνητο\n${f['ΠΕΡΙΟΧΗ']||f['Περιοχή']||''} · ${f['ΕΙΔΟΣ ΑΚΙΝΗΤΟΥ']||f['Είδος ακινήτου']||''}\n${fmtEuro(f['Τιμή'])}\nScore: ${f['Σκορ %']}%`)}`);
}

// ── ΚΑΤΑΣΚΕΥΑΣΤΕΣ ─────────────────────────────────────────────
function pgKa(C2, A) {
  const canEdit=['admin','agent'].includes(ME.role);
  A.innerHTML=canEdit?`<button class="btn btn-dark" onclick="openKaForm()">+ Νέος</button>`:'';
  C2.innerHTML=`<div class="list-box">
    <div class="list-head"><span class="list-ttl">Κατασκευαστές</span><span class="list-cnt"> (${DB.ka.length})</span>
    <div style="margin-left:auto"><div class="srch"><span class="srch-ic">🔍</span><input placeholder="Αναζήτηση..." id="kaSrch" oninput="filterKa()"></div></div></div>
    <div style="overflow-x:auto"><table><thead><tr><th>Όνομα</th><th>Τηλέφωνο</th><th>Email</th><th>Περιοχή</th><th>Ειδικότητα</th></tr></thead>
    <tbody id="kaBody"></tbody></table></div></div>`;
  renderKaRows(DB.ka);
}
function renderKaRows(recs) {
  const tb=document.getElementById('kaBody'); if(!tb) return;
  if(!recs.length){tb.innerHTML=`<tr><td colspan="5"><div class="empty"><div class="empty-ic">🔧</div><div class="empty-tx">Δεν βρέθηκαν</div></div></td></tr>`;return;}
  tb.innerHTML=recs.map(r=>{const f=r.fields;return`<tr onclick="viewKa('${r.id}')"><td><strong>${f['Name']||'-'}</strong></td><td>${f['Phone']||f['Τηλέφωνο']||'-'}</td><td>${f['Email']||'-'}</td><td>${f['Περιοχή']||'-'}</td><td>${f['Ειδικότητα']||'-'}</td></tr>`;}).join('');
}
function filterKa(){const s=(document.getElementById('kaSrch')?.value||'').toLowerCase();renderKaRows(s?DB.ka.filter(x=>JSON.stringify(x.fields).toLowerCase().includes(s)):DB.ka);}
function viewKa(id){
  const rec=DB.ka.find(r=>r.id===id);if(!rec)return;
  const f=rec.fields,canEdit=['admin','agent'].includes(ME.role);
  openModal('🔧 Κατασκευαστής',`<div class="dg">${Object.entries(f).filter(([k,v])=>v&&!Array.isArray(v)).map(([k,v])=>`<div class="di"><div class="di-lbl">${k}</div><div class="di-val">${v}</div></div>`).join('')}</div>`,
    `${canEdit?`<button class="btn btn-err btn-sm" onclick="delKa('${id}')">🗑️</button><button class="btn btn-dark btn-sm" onclick="CM();openKaForm('${id}')">✏️</button>`:''}
    <button class="btn btn-out btn-sm" onclick="CM()">Κλείσιμο</button>`);
}
async function openKaForm(id=null){
  const rec=id?DB.ka.find(r=>r.id===id):null,f=rec?.fields||{};
  openModal(id?'✏️ Επεξεργασία':'+ Νέος Κατασκευαστής',`<div class="fg">
    <div class="f fspan"><label>Όνομα</label><input type="text" id="k_n" value="${f['Name']||''}"></div>
    <div class="f"><label>Τηλέφωνο</label><input type="tel" id="k_p" value="${f['Phone']||f['Τηλέφωνο']||''}"></div>
    <div class="f"><label>Email</label><input type="email" id="k_e" value="${f['Email']||''}"></div>
    <div class="f"><label>Περιοχή</label><input type="text" id="k_pe" value="${f['Περιοχή']||''}"></div>
    <div class="f"><label>Ειδικότητα</label><input type="text" id="k_ei" value="${f['Ειδικότητα']||''}"></div>
    <div class="f fspan"><label>Σημειώσεις</label><textarea id="k_no" rows="2">${f['Σημειώσεις']||''}</textarea></div>
  </div>`,`<button class="btn btn-out" onclick="CM()">Ακύρωση</button><button class="btn btn-dark" onclick="saveKa('${id||''}')">💾</button>`);
}
async function saveKa(id){
  const f={'Name':document.getElementById('k_n').value,'Phone':document.getElementById('k_p').value,'Email':document.getElementById('k_e').value,'Περιοχή':document.getElementById('k_pe').value,'Ειδικότητα':document.getElementById('k_ei').value,'Σημειώσεις':document.getElementById('k_no').value};
  Object.keys(f).forEach(k=>!f[k]&&delete f[k]);
  load(true);
  try{if(id){await updateR(C.T.KA,id,f);toast('Αποθηκεύτηκε!','s');}else{await createR(C.T.KA,f);toast('Δημιουργήθηκε!','s');}CM();await loadAll();pgKa(document.getElementById('pgContent'),document.getElementById('tbRight'));}
  catch(e){toast('Σφάλμα','e');}load(false);
}
async function delKa(id){if(!confirm('Διαγραφή;'))return;load(true);try{await deleteR(C.T.KA,id);toast('Διαγράφηκε','s');CM();await loadAll();pgKa(document.getElementById('pgContent'),document.getElementById('tbRight'));}catch(e){toast('Σφάλμα','e');}load(false);}

// ── USERS ─────────────────────────────────────────────────────
function pgUs(C2,A){
  if(ME.role!=='admin'){C2.innerHTML='<div class="empty"><div class="empty-ic">🔒</div><div class="empty-tx">Δεν έχεις πρόσβαση</div></div>';return;}
  A.innerHTML=`<button class="btn btn-dark" onclick="openUsForm()">+ Νέος Χρήστης</button>`;
  C2.innerHTML=`<div class="list-box"><div class="list-head"><span class="list-ttl">Χρήστες</span><span class="list-cnt"> (${DB.us.length})</span></div>
    <table><thead><tr><th>Όνομα</th><th>Email</th><th>Κινητό</th><th>Ρόλος</th></tr></thead>
    <tbody>${DB.us.map(r=>{const f=r.fields,ro=(f['Role']||'agent').toLowerCase(),rc={admin:'b-red',agent:'b-blue',viewer:'b-gray'}[ro]||'b-gray';
      return`<tr onclick="openUsForm('${r.id}')"><td><strong>${f['Name']||'-'}</strong></td><td>${f['Email']||'-'}</td><td>${f['Phone']||f['Κινητό']||'-'}</td><td><span class="badge ${rc}">${ro}</span></td></tr>`;}).join('')}
    </tbody></table></div>`;
}
async function openUsForm(id=null){
  const rec=id?DB.us.find(r=>r.id===id):null,f=rec?.fields||{};
  openModal(id?'✏️ Επεξεργασία Χρήστη':'+ Νέος Χρήστης',`<div class="fg">
    <div class="f fspan"><label>Ονοματεπώνυμο</label><input type="text" id="u_n" value="${f['Name']||''}"></div>
    <div class="f"><label>Email</label><input type="email" id="u_e" value="${f['Email']||''}"></div>
    <div class="f"><label>Κωδικός ${id?'(κενό=χωρίς αλλαγή)':''}</label><input type="password" id="u_p"></div>
    <div class="f"><label>Κινητό</label><input type="tel" id="u_ph" value="${f['Phone']||f['Κινητό']||''}"></div>
    <div class="f"><label>Ρόλος</label><select id="u_r">${['admin','agent','viewer'].map(r=>`<option value="${r}" ${(f['Role']||'').toLowerCase()===r?'selected':''}>${r}</option>`).join('')}</select></div>
  </div>`,
  `${id?`<button class="btn btn-err btn-sm" onclick="delUs('${id}')">🗑️</button>`:''}
  <button class="btn btn-out" onclick="CM()">Ακύρωση</button><button class="btn btn-dark" onclick="saveUs('${id||''}')">💾</button>`);
}
async function saveUs(id){
  const p=document.getElementById('u_p').value;
  const f={'Name':document.getElementById('u_n').value,'Email':document.getElementById('u_e').value,'Phone':document.getElementById('u_ph').value,'Role':document.getElementById('u_r').value};
  if(p) f['Password']=p;
  Object.keys(f).forEach(k=>!f[k]&&delete f[k]);
  load(true);
  try{if(id){await updateR(C.T.US,id,f);toast('Αποθηκεύτηκε!','s');}else{await createR(C.T.US,f);toast('Δημιουργήθηκε!','s');}CM();await loadAll();pgUs(document.getElementById('pgContent'),document.getElementById('tbRight'));}
  catch(e){toast('Σφάλμα','e');}load(false);
}
async function delUs(id){if(!confirm('Διαγραφή;'))return;load(true);try{await deleteR(C.T.US,id);toast('Διαγράφηκε','s');CM();await loadAll();pgUs(document.getElementById('pgContent'),document.getElementById('tbRight'));}catch(e){toast('Σφάλμα','e');}load(false);}

// ── LOGO ──────────────────────────────────────────────────────
function triggerLogo(){document.getElementById('logoFile').click();}
function handleLogo(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{localStorage.setItem('crm_logo',e.target.result);applyLogo(e.target.result);toast('Logo ανανεώθηκε!','s');};
  reader.readAsDataURL(file);
}
function applyLogo(src){
  const sb=document.getElementById('sbLogo');
  if(sb) sb.innerHTML=`<img src="${src}" style="max-height:44px;max-width:180px;object-fit:contain">`;
  const ll=document.getElementById('loginLogo');
  if(ll) ll.innerHTML=`<img src="${src}" style="max-height:56px;max-width:200px;object-fit:contain">`;
}
function loadLogo(){const s=localStorage.getItem('crm_logo');if(s)applyLogo(s);}

// ── THEME ─────────────────────────────────────────────────────
function toggleTheme(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'light':'dark');
  localStorage.setItem('crm_theme',dark?'light':'dark');
  document.getElementById('themeBtn').textContent=dark?'🌙':'☀️';
}
function loadTheme(){
  const t=localStorage.getItem('crm_theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  const btn=document.getElementById('themeBtn');if(btn)btn.textContent=t==='dark'?'☀️':'🌙';
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(t,b,ft=''){
  document.getElementById('mTtl').textContent=t;
  document.getElementById('mBody').innerHTML=b;
  document.getElementById('mFoot').innerHTML=ft;
  document.getElementById('overlay').classList.add('open');
}
function CM(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)CM();});
document.addEventListener('click',e=>{
  if(!e.target.closest('.ms'))document.querySelectorAll('.ms-dropdown.open,.ms-display.open').forEach(el=>el.classList.remove('open'));
});

// ── TOAST ─────────────────────────────────────────────────────
function toast(m,t='i'){
  const c=document.getElementById('toasts'),el=document.createElement('div');
  el.className=`toast t-${t}`;el.innerHTML=`<span>${t==='s'?'✓':t==='e'?'✕':'ℹ'}</span> ${m}`;
  c.appendChild(el);setTimeout(()=>el.remove(),3200);
}

// ── LOADER ────────────────────────────────────────────────────
function load(s){document.getElementById('loader').style.display=s?'flex':'none';}

// ── SIDEBAR MOBILE ────────────────────────────────────────────
function toggleSB(){document.getElementById('sb').classList.toggle('open');document.getElementById('sbOv').classList.toggle('open');}
function closeSB(){document.getElementById('sb').classList.remove('open');document.getElementById('sbOv').classList.remove('open');}

// ── KEYBOARD ──────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')CM();
  if(e.key==='Enter'&&document.getElementById('loginPage').style.display!=='none')doLogin();
});

// ── AUTO LOGIN ────────────────────────────────────────────────
window.addEventListener('load',async()=>{
  const u=localStorage.getItem('crm_u'),t=localStorage.getItem('crm_t');
  if(u&&t){try{ME=JSON.parse(u);C.TOKEN=t;await boot();}catch(e){localStorage.removeItem('crm_u');}}
  load(false);
});
</script>
</body>
</html>
