<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerraHomes CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS VARIABLES — ΑΛΛΑΞΕ ΕΔΩ ΤΑ ΧΡΩΜΑΤΑ & FONTS
   ============================================================ */
:root {
  --primary: #1a1a2e;
  --secondary: #16213e;
  --accent: #c9a96e;
  --accent-light: #e8d5b0;
  --bg: #f8f7f4;
  --bg-card: #ffffff;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: #e5e0d8;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(26,26,46,0.08);
  --shadow-lg: 0 8px 40px rgba(26,26,46,0.15);
  --sidebar-width: 260px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ============================================================
   LOGIN PAGE
   ============================================================ */
#loginPage {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, #0f3460 100%);
  position: relative;
  overflow: hidden;
}

#loginPage::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(201,169,110,0.15) 0%, transparent 70%);
  top: -200px; right: -200px;
  border-radius: 50%;
}

#loginPage::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(201,169,110,0.1) 0%, transparent 70%);
  bottom: -100px; left: -100px;
  border-radius: 50%;
}

.login-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(201,169,110,0.3);
  border-radius: 24px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
}

.login-logo {
  text-align: center;
  margin-bottom: 36px;
}

.login-logo h1 {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 300;
  color: #fff;
  letter-spacing: 2px;
}

.login-logo span {
  color: var(--accent);
  font-weight: 600;
}

.login-logo p {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  margin-top: 4px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius);
  color: #fff;
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: all 0.3s;
}

.form-group input:focus {
  border-color: var(--accent);
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 0 3px rgba(201,169,110,0.15);
}

.form-group input::placeholder { color: rgba(255,255,255,0.3); }

.btn-login {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent), #b8935a);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.3s;
  margin-top: 8px;
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(201,169,110,0.4);
}

.login-error {
  color: #ff6b6b;
  font-size: 13px;
  text-align: center;
  margin-top: 12px;
  display: none;
}

/* ============================================================
   MAIN APP LAYOUT
   ============================================================ */
#mainApp { display: none; }

.app-layout {
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-width);
  background: var(--primary);
  min-height: 100vh;
  position: fixed;
  left: 0; top: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s;
}

.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-logo h2 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 400;
  color: #fff;
  letter-spacing: 1px;
}

.sidebar-logo span { color: var(--accent); }

.sidebar-logo small {
  display: block;
  color: rgba(255,255,255,0.4);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
}

.sidebar-user {
  padding: 16px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-avatar {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #b8935a);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  color: #fff;
  font-size: 14px;
  flex-shrink: 0;
}

.user-info { flex: 1; overflow: hidden; }

.user-name {
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.user-role {
  font-size: 11px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.sidebar-nav {
  flex: 1;
  padding: 16px 0;
  overflow-y: auto;
}

.nav-section-label {
  padding: 8px 24px 4px;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 24px;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
  border-left: 3px solid transparent;
  position: relative;
}

.nav-item:hover {
  color: #fff;
  background: rgba(255,255,255,0.05);
}

.nav-item.active {
  color: #fff;
  background: rgba(201,169,110,0.15);
  border-left-color: var(--accent);
}

.nav-item .nav-icon { font-size: 18px; width: 20px; text-align: center; }

.nav-badge {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 600;
}

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.btn-logout {
  width: 100%;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 13px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-logout:hover {
  background: rgba(239,68,68,0.2);
  color: #ff6b6b;
  border-color: rgba(239,68,68,0.3);
}

/* MAIN CONTENT */
.main-content {
  margin-left: var(--sidebar-width);
  flex: 1;
  min-height: 100vh;
}

.top-bar {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.page-title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 500;
  color: var(--text);
}

.top-bar-actions { display: flex; align-items: center; gap: 12px; }

.page-content { padding: 32px; }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  padding: 10px 20px;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover {
  background: #b8935a;
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(201,169,110,0.3);
}

.btn-secondary {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover { background: var(--border); }

.btn-danger {
  background: rgba(239,68,68,0.1);
  color: var(--danger);
  border: 1px solid rgba(239,68,68,0.2);
}

.btn-danger:hover { background: rgba(239,68,68,0.2); }

.btn-success {
  background: rgba(16,185,129,0.1);
  color: var(--success);
  border: 1px solid rgba(16,185,129,0.2);
}

.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ============================================================
   CARDS & STATS
   ============================================================ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: transform 0.2s;
}

.stat-card:hover { transform: translateY(-2px); }

.stat-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.stat-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
}

.stat-icon {
  float: right;
  font-size: 28px;
  opacity: 0.2;
}

/* ============================================================
   TABLE
   ============================================================ */
.table-container {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.table-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.table-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 500;
}

.search-box {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  width: 240px;
  transition: all 0.2s;
}

.search-box:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  padding: 12px 16px;
  text-align: left;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
}

th:hover { color: var(--text); }

td {
  padding: 14px 16px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

tr:last-child td { border-bottom: none; }

tr:hover td { background: rgba(201,169,110,0.03); }

.badge {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  display: inline-block;
}

.badge-green { background: rgba(16,185,129,0.1); color: var(--success); }
.badge-yellow { background: rgba(245,158,11,0.1); color: var(--warning); }
.badge-blue { background: rgba(59,130,246,0.1); color: var(--info); }
.badge-red { background: rgba(239,68,68,0.1); color: var(--danger); }
.badge-gray { background: rgba(107,114,128,0.1); color: var(--text-muted); }
.badge-gold { background: rgba(201,169,110,0.15); color: var(--accent); }

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg-card);
  border-radius: 20px;
  width: 100%;
  max-width: 700px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.3s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg-card);
  z-index: 1;
}

.modal-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
}

.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--bg);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.modal-close:hover { background: var(--border); }

.modal-body { padding: 24px 28px; }

.modal-footer {
  padding: 20px 28px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  position: sticky;
  bottom: 0;
  background: var(--bg-card);
}

/* FORM INSIDE MODAL */
.modal .form-group label {
  color: var(--text-muted);
  font-size: 12px;
}

.modal .form-group input,
.modal .form-group select,
.modal .form-group textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: all 0.2s;
}

.modal .form-group input:focus,
.modal .form-group select:focus,
.modal .form-group textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-full { grid-column: 1 / -1; }

/* ============================================================
   MATCHING SCORE PAGE
   ============================================================ */
.matching-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 24px;
}

.match-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: all 0.3s;
}

.match-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.match-card-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.match-score-circle {
  width: 60px; height: 60px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}

.score-100 { background: rgba(16,185,129,0.15); color: var(--success); border: 2px solid var(--success); }
.score-90 { background: rgba(16,185,129,0.1); color: #059669; border: 2px solid #059669; }
.score-80 { background: rgba(59,130,246,0.1); color: var(--info); border: 2px solid var(--info); }
.score-70 { background: rgba(245,158,11,0.1); color: var(--warning); border: 2px solid var(--warning); }
.score-60 { background: rgba(239,68,68,0.1); color: var(--danger); border: 2px solid var(--danger); }

.match-score-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }

.match-info { flex: 1; padding-right: 12px; }

.match-periochi {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
}

.match-eidos { font-size: 13px; color: var(--text-muted); }

.match-card-body { padding: 16px 20px; }

.match-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.match-detail-item { }

.match-detail-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 2px;
}

.match-detail-value {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.match-timi {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  color: var(--accent);
  margin-bottom: 16px;
}

.match-card-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ============================================================
   SCORE BAR
   ============================================================ */
.score-bar-container { margin-bottom: 16px; }
.score-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.score-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), #10b981);
  transition: width 1s ease;
}

/* ============================================================
   CHARTS
   ============================================================ */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  margin-bottom: 32px;
}

.chart-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 24px;
}

.chart-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 20px;
  color: var(--text);
}

.chart-bar-item {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.chart-bar-label { font-size: 12px; color: var(--text-muted); width: 120px; flex-shrink: 0; }
.chart-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.chart-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--primary)); transition: width 1s; }
.chart-bar-count { font-size: 12px; font-weight: 600; color: var(--text); width: 24px; text-align: right; }

/* ============================================================
   LOADING & EMPTY STATES
   ============================================================ */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(248,247,244,0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state-text { font-size: 16px; margin-bottom: 8px; }
.empty-state-sub { font-size: 13px; }

/* ============================================================
   TOAST NOTIFICATIONS
   ============================================================ */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 14px 20px;
  border-radius: var(--radius);
  background: var(--primary);
  color: #fff;
  font-size: 13px;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastIn 0.3s ease;
  max-width: 320px;
}

.toast-success { background: var(--success); }
.toast-error { background: var(--danger); }
.toast-warning { background: var(--warning); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(100%); }

/* ============================================================
   PROPERTY DETAIL VIEW
   ============================================================ */
.property-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.property-detail-item {
  padding: 12px 16px;
  background: var(--bg);
  border-radius: 8px;
}

.property-detail-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.property-detail-value {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}

/* ============================================================
   MOBILE RESPONSIVE
   ============================================================ */
.hamburger {
  display: none;
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: var(--text);
}

@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.mobile-open {
    transform: translateX(0);
  }
  .main-content {
    margin-left: 0;
  }

  .page-content { padding: 16px; }
  .form-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .matching-grid { grid-template-columns: 1fr; }

   PAGINATION
   ============================================================ */

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 20px;
  border-top: 1px solid var(--border);
}

.page-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  color: var(--text);
}

.page-btn:hover, .page-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* FILTERS ROW */
.filters-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.filter-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-body);

  background: var(--bg-card);
  color: var(--text);
  outline: none;
  cursor: pointer;
}

.filter-select:focus { border-color: var(--accent); }
</style>

<script>
// ============================================================
// CONFIGURATION — ΑΛΛΑΞΕ ΕΔΩ ΤΑ ΣΤΟΙΧΕΙΑ ΣΟΥ
// ============================================================
const CONFIG = {
  AIRTABLE_TOKEN:'patyuRymx923eZEo5.485e709ac0bf3304b7f6905b759c859b43470226273b1c14675285a0f0da5962';
  BASE_ID: 'app3fUC1uIoQsX2DP',
  TABLES: {
    AKINITA: 'ΑΚΙΝΗΤΑ',
    ZITISEIS: 'Ζητήσεις',
    MATCHING: 'Matching Σκορ',
    USERS: 'USERS',
    KATASKEVASTES: 'ΚΑΤΑΣΚΕΥΑΣΤΕΣ'
  }
};

// ============================================================
// APP STATE
// ============================================================
let currentUser = null;
let currentPage = 'home';
let allData = {
  akinita: [],
  zitiseis: [],
  matching: [],
  users: [],
  kataskevastes: []
};

// ============================================================
// AIRTABLE API
// ============================================================
async function airtableRequest(table, method = 'GET', body = null, recordId = null) {
  const url = recordId
    ? `https://api.airtable.com/v0/${CONFIG.BASE_ID}/${encodeURIComponent(table)}/${recordId}`
    : `https://api.airtable.com/v0/${CONFIG.BASE_ID}/${encodeURIComponent(table)}`;

  const options = {
    method,
    headers: {
      'Authorization': `Bearer ${CONFIG.AIRTABLE_TOKEN}`,
      'Content-Type': 'application/json'
    }
  };

  if (body) options.body = JSON.stringify(body);

  const res = await fetch(url, options);
  if (!res.ok) throw new Error(`Airtable error: ${res.status}`);
  return res.json();
}

async function getAllRecords(table, filterFormula = '') {
  let records = [];
  let offset = null;

  do {
    let url = `https://api.airtable.com/v0/${CONFIG.BASE_ID}/${encodeURIComponent(table)}?pageSize=100`;
    if (filterFormula) url += `&filterByFormula=${encodeURIComponent(filterFormula)}`;
    if (offset) url += `&offset=${offset}`;

    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer ${CONFIG.AIRTABLE_TOKEN}` }
    });
    const data = await res.json();
    records = records.concat(data.records || []);
    offset = data.offset;
  } while (offset);

  return records;
}

async function createRecord(table, fields) {
  return airtableRequest(table, 'POST', { fields });
}

async function updateRecord(table, recordId, fields) {
  return airtableRequest(table, 'PATCH', { fields }, recordId);
}

async function deleteRecord(table, recordId) {
  return airtableRequest(table, 'DELETE', null, recordId);
}

// ============================================================
// AUTH — LOGIN/LOGOUT
// ============================================================
async function handleLogin() {
  CONFIG.AIRTABLE_TOKEN = 'patyuRymx923eZEo5.485e709ac0bf3304b7f6905b759c859b43470226273b1c14675285a0f0da5962';
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();

  if (!email || !password) {
    showLoginError('Συμπλήρωσε email και κωδικό');
    return;
  }

  showLoading(true);
  try {
    // Fetch all users and find by email client-side
    const allUsers = await getAllRecords(CONFIG.TABLES.USERS);
    const records = allUsers.filter(r => 
      (r.fields['Email'] || '').toLowerCase().trim() === email.toLowerCase().trim()
    );

    if (records.length === 0) {
      showLoginError('Δεν βρέθηκε χρήστης με αυτό το email');
      showLoading(false);
      return;
    }

    const user = records[0];
    const fields = user.fields;

    // Check password (stored in "Password" field in USERS table)
    // ΠΡΟΣΟΧΗ: Αλλαξε το field name αν είναι διαφορετικό
    if (fields['Password'] !== password) {
      showLoginError('Λανθασμένος κωδικός');
      showLoading(false);
      return;
    }

    // Set current user
    currentUser = {
      id: user.id,
      name: fields['Name'] || fields['Ονοματεπώνυμο'] || email,
      email: email,
      role: (fields['Role'] || fields['Ρόλος'] || 'agent').toLowerCase(),
      phone: fields['Phone'] || fields['Κινητό'] || ''
    };

    localStorage.setItem('terraUser', JSON.stringify(currentUser));
    await initApp();

  } catch (err) {
    showLoginError('Σφάλμα σύνδεσης. Δοκίμασε ξανά.');
    console.error(err);
  }
  showLoading(false);
}

function handleLogout() {
  currentUser = null;
  localStorage.removeItem('terraUser');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

// ============================================================
// APP INIT
// ============================================================
async function initApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';

  // Set user info in sidebar
  document.getElementById('userName').textContent = currentUser.name;
  document.getElementById('userRole').textContent = currentUser.role.toUpperCase();
  document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

  // Hide admin-only items for non-admins
  if (currentUser.role !== 'admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
  }

  // Load all data
  showLoading(true);
  await loadAllData();
  showLoading(false);

  showPage('home');
}

async function loadAllData() {
  try {
    // Filter data based on role
    const isAdmin = currentUser.role === 'admin';

    const [akinita, zitiseis, matching, users, kataskevastes] = await Promise.all([
      getAllRecords(CONFIG.TABLES.AKINITA),
      getAllRecords(CONFIG.TABLES.ZITISEIS),
      getAllRecords(CONFIG.TABLES.MATCHING),
      getAllRecords(CONFIG.TABLES.USERS),
      getAllRecords(CONFIG.TABLES.KATASKEVASTES)
    ]);

    allData.akinita = akinita;
    allData.zitiseis = zitiseis;
    allData.matching = matching;
    allData.users = users;
    allData.kataskevastes = kataskevastes;

    // Filter matching for current user (agents see only their own)
    if (!isAdmin) {
      allData.matching = matching.filter(r =>
        (r.fields['User Ζήτησης'] || '').toLowerCase() === currentUser.email.toLowerCase()
      );
    }

    // Update matching badge
    document.getElementById('matchingBadge').textContent = allData.matching.length;

  } catch (err) {
    showToast('Σφάλμα φόρτωσης δεδομένων', 'error');
    console.error(err);
  }
}

// ============================================================
// NAVIGATION
// ============================================================
function showPage(page) {
  currentPage = page;

  // Update nav active state
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');

  // Update page title
  const titles = {
    home: 'Αρχική',
    akinita: 'Ακίνητα',
    zitiseis: 'Ζητήσεις',
    matching: 'Matching Σκορ',
    kataskevastes: 'Κατασκευαστές',
    users: 'Χρήστες'
  };
  document.getElementById('pageTitle').textContent = titles[page] || page;

  // Render page
  const content = document.getElementById('pageContent');
  const actions = document.getElementById('topBarActions');

  switch(page) {
    case 'home': renderHome(content, actions); break;
    case 'akinita': renderAkinita(content, actions); break;
    case 'zitiseis': renderZitiseis(content, actions); break;
    case 'matching': renderMatching(content, actions); break;
    case 'kataskevastes': renderKataskevastes(content, actions); break;
    case 'users': renderUsers(content, actions); break;
  }

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('mobile-open');
}

// ============================================================
// HOME PAGE
// ============================================================
function renderHome(content, actions) {
  actions.innerHTML = `
    <button class="btn btn-secondary btn-sm" onclick="refreshData()">🔄 Ανανέωση</button>
  `;

  const isAdmin = currentUser.role === 'admin';
  const myAkinita = isAdmin ? allData.akinita : allData.akinita.filter(r =>
    JSON.stringify(r.fields['User'] || []).includes(currentUser.id)
  );

  // Stats
  const totalAkinita = myAkinita.length;
  const diathesima = myAkinita.filter(r => r.fields['Status'] === 'Διαθέσιμο').length;
  const offmarket = myAkinita.filter(r => r.fields['Status'] === 'Off Market').length;
  const totalMatching = allData.matching.length;

  // Count by type
  const byEidos = {};
  myAkinita.forEach(r => {
    const eidos = r.fields['Είδος ακινήτου'] || r.fields['ΕΙΔΟΣ ΑΚΙΝΗΤΟΥ'] || 'Άλλο';
    byEidos[eidos] = (byEidos[eidos] || 0) + 1;
  });

  // Count by periochi
  const byPeriochi = {};
  myAkinita.forEach(r => {
    const p = r.fields['Περιοχή'] || r.fields['ΠΕΡΙΟΧΗ'] || 'Άλλη';
    byPeriochi[p] = (byPeriochi[p] || 0) + 1;
  });

  const maxEidos = Math.max(...Object.values(byEidos), 1);
  const maxPeriochi = Math.max(...Object.values(byPeriochi), 1);

  content.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-icon">🏢</span>
        <div class="stat-label">Συνολικά Ακίνητα</div>
        <div class="stat-value">${totalAkinita}</div>
        <div class="stat-sub">Στο χαρτοφυλάκιό μου</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">✅</span>
        <div class="stat-label">Διαθέσιμα</div>
        <div class="stat-value" style="color:var(--success)">${diathesima}</div>
        <div class="stat-sub">Ενεργές αγγελίες</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">🔒</span>
        <div class="stat-label">Off Market</div>
        <div class="stat-value" style="color:var(--accent)">${offmarket}</div>
        <div class="stat-sub">Αποκλειστικά</div>
      </div>
      <div class="stat-card">
        <span class="stat-icon">⭐</span>
        <div class="stat-label">Matching</div>
        <div class="stat-value" style="color:var(--info)">${totalMatching}</div>
        <div class="stat-sub">Αποτελέσματα</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">📊 Ανά Είδος Ακινήτου</div>
        ${Object.entries(byEidos).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v])=>`
          <div class="chart-bar-item">
            <div class="chart-bar-label">${k}</div>
            <div class="chart-bar-track">
              <div class="chart-bar-fill" style="width:${(v/maxEidos)*100}%"></div>
            </div>
            <div class="chart-bar-count">${v}</div>
          </div>
        `).join('')}
      </div>
      <div class="chart-card">
        <div class="chart-title">📍 Ανά Περιοχή</div>
        ${Object.entries(byPeriochi).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v])=>`
          <div class="chart-bar-item">
            <div class="chart-bar-label">${k}</div>
            <div class="chart-bar-track">
              <div class="chart-bar-fill" style="width:${(v/maxPeriochi)*100}%"></div>
            </div>
            <div class="chart-bar-count">${v}</div>
          </div>
        `).join('')}
      </div>
    </div>

    ${isAdmin ? `
    <div class="chart-card">
      <div class="chart-title">👥 Ακίνητα ανά Agent</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-top:8px">
        ${allData.users.filter(u=>u.fields['Role']==='agent'||u.fields['Ρόλος']==='agent').map(u=>`
          <div style="background:var(--bg);padding:16px;border-radius:var(--radius);text-align:center">
            <div style="font-size:28px;font-family:var(--font-display);font-weight:500;color:var(--accent)">
              ${allData.akinita.filter(r=>JSON.stringify(r.fields['User']||[]).includes(u.id)).length}
            </div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${u.fields['Name']||u.fields['Ονοματεπώνυμο']||'Agent'}</div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}
  `;
}

// ============================================================
// ΑΚΙΝΗΤΑ PAGE
// ============================================================
function renderAkinita(content, actions) {
  const canEdit = ['admin', 'agent'].includes(currentUser.role);
  const isAdmin = currentUser.role === 'admin';

  actions.innerHTML = canEdit ? `
    <button class="btn btn-primary" onclick="openAkinitoForm()">+ Νέο Ακίνητο</button>
  ` : '';

  let filtered = isAdmin ? allData.akinita : allData.akinita.filter(r =>
    JSON.stringify(r.fields['User'] || []).includes(currentUser.id)
  );

  // Get unique values for filters
  const statuses = [...new Set(allData.akinita.map(r => r.fields['Status']).filter(Boolean))];
  const eidi = [...new Set(allData.akinita.map(r => r.fields['Είδος ακινήτου'] || r.fields['ΕΙΔΟΣ ΑΚΙΝΗΤΟΥ']).filter(Boolean))];
  const perioches = [...new Set(allData.akinita.map(r => r.fields['Περιοχή'] || r.fields['ΠΕΡΙΟΧΗ']).filter(Boolean))];

  content.innerHTML = `
    <div class="table-container">
      <div class="table-header">
        <div class="table-title">Ακίνητα <span style="color:var(--text-muted);font-size:16px">(${filtered.length})</span></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input class="search-box" type="text" placeholder="🔍 Αναζήτηση..." id="akinitoSearch" oninput="filterAkinita()">
        </div>
      </div>
      <div class="filters-row">
        <select class="filter-select" id="filterStatus" onchange="filterAkinita()">
          <option value="">Όλα τα Status</option>
          ${statuses.map(s=>`<option value="${s}">${s}</option>`).join('')}
        </select>
        <select class="filter-select" id="filterEidos" onchange="filterAkinita()">
          <option value="">Όλα τα Είδη</option>
          ${eidi.map(e=>`<option value="${e}">${e}</option>`).join('')}
        </select>
        <select class="filter-select" id="filterPeriochi" onchange="filterAkinita()">
          <option value="">Όλες οι Περιοχές</option>
          ${perioches.map(p=>`<option value="${p}">${p}</option>`).join('')}
        </select>
      </div>
      <div style="overflow-x:auto">
        <table id="akinitoTable">
          <thead>
            <tr>
              <th>Α/Α</th>
              <th>Περιοχή</th>
              <th>Είδος</th>
              <th>Status</th>
              <th>Εμβαδό</th>
              <th>Τιμή</th>
              <th>Agent</th>
              <th>Ενέργειες</th>
            </tr>
          </thead>
          <tbody id="akinitoTableBody">
          </tbody>
        </table>
      </div>
      <div class="pagination" id="akinitaPagination"></div>
    </div>
  `;

  renderAkinitoRows(filtered);
}

function renderAkinitoRows(records) {
  const tbody = document.getElementById('akinitoTableBody');
  if (!tbody) return;

  if (records.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8">
      <div class="empty-state">
        <div class="empty-state-icon">🏢</div>
        <div class="empty-state-text">Δεν βρέθηκαν ακίνητα</div>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = records.map(r => {
    const f = r.fields;
    const status = f['Status'] || '';
    const statusClass = {
      'Διαθέσιμο': 'badge-green',
      'Off Market': 'badge-gold',
      'Πουλήθηκε': 'badge-gray',
      'Αποσύρθηκε': 'badge-red'
    }[status] || 'badge-gray';

    const timi = f['Τιμή'] ? `€${Number(f['Τιμή']).toLocaleString('el-GR')}` : '-';

function filterAkinita() {
  const search = (document.getElementById('akinitoSearch')?.value || '').toLowerCase();
  const status = document.getElementById('filterStatus')?.value || '';
  const eidos = document.getElementById('filterEidos')?.value || '';
  const periochi = document.getElementById('filterPeriochi')?.value || '';
  const isAdmin = currentUser.role === 'admin';

  let filtered = isAdmin ? allData.akinita : allData.akinita.filter(r =>
    JSON.stringify(r.fields['User'] || []).includes(currentUser.id)
  );

  if (search) {
    filtered = filtered.filter(r => {
      const f = r.fields;
      return JSON.stringify(f).toLowerCase().includes(search);
    });
  }
  if (status) filtered = filtered.filter(r => r.fields['Status'] === status);
  if (eidos) filtered = filtered.filter(r => (r.fields['Είδος ακινήτου'] || r.fields['ΕΙΔΟΣ ΑΚΙΝΗΤΟΥ']) === eidos);
  if (periochi) filtered = filtered.filter(r => (r.fields['Περιοχή'] || r.fields['ΠΕΡΙΟΧΗ']) === periochi);

  renderAkinitoRows(filtered);
}

function viewAkinito(id) {
  const record = allData.akinita.find(r => r.id === id);

  const f = record.fields;

async function saveAkinito(id) {
  const fields = {
    'Περιοχή': document.getElementById('f_periochi').value,
    'Είδος ακινήτου': document.getElementById('f_eidos').value,
    'Status': document.getElementById('f_status').value,
    'Τιμή': parseFloat(document.getElementById('f_timi').value) || null,
    'Εμβ. Μεικτό': parseFloat(document.getElementById('f_emvado').value) || null,
    'Εμβαδό Καθαρό': parseFloat(document.getElementById('f_emvado_k').value) || null,
    'Δωμάτια': document.getElementById('f_domata').value,
    'Έτος κατασκευής': parseInt(document.getElementById('f_etos').value) || null,
    'Όροφος': document.getElementById('f_oros').value,
    'Θέση Στάθμευσης': document.getElementById('f_stathmeusi').value,
    'Διεύθυνση': document.getElementById('f_diefthinsi').value,
    'Σημειώσεις': document.getElementById('f_simeioseis').value,
  };

  // Remove null values
  Object.keys(fields).forEach(k => fields[k] === null && delete fields[k]);

  showLoading(true);
  try {
    if (id) {
      await updateRecord(CONFIG.TABLES.AKINITA, id, fields);
      showToast('Ακίνητο ενημερώθηκε! ✅', 'success');
    } else {
      await createRecord(CONFIG.TABLES.AKINITA, fields);
      showToast('Νέο ακίνητο δημιουργήθηκε! ✅', 'success');
    }
    closeModal();
    await loadAllData();
    renderAkinita(document.getElementById('pageContent'), document.getElementById('topBarActions'));
  } catch(err) {
    showToast('Σφάλμα αποθήκευσης', 'error');
  }
  showLoading(false);
}

async function deleteAkinito(id) {
  if (!confirm('Σίγουρα θέλεις να διαγράψεις αυτό το ακίνητο;')) return;
  showLoading(true);
  try {
    await deleteRecord(CONFIG.TABLES.AKINITA, id);
    showToast('Ακίνητο διαγράφηκε', 'success');
    await loadAllData();
    renderAkinita(document.getElementById('pageContent'), document.getElementById('topBarActions'));
  } catch(err) {
    showToast('Σφάλμα διαγραφής', 'error');
  }
  showLoading(false);
}

function renderMatching(content, actions) {
  actions.innerHTML = `
    <button class="btn btn-secondary btn-sm" onclick="refreshData()">🔄 Ανανέωση</button>
  `;

  const records = allData.matching.sort((a,b) => (b.fields['Σκορ %']||0) - (a.fields['Σκορ %']||0));

  content.innerHTML = `
    <div style="margin-bottom:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <input class="search-box" type="text" placeholder="🔍 Αναζήτηση..." id="matchSearch" oninput="filterMatching()">
      <select class="filter-select" id="matchScoreFilter" onchange="filterMatching()">
        <option value="">Όλα τα σκορ</option>
        <option value="90">90%+</option>
        <option value="80">80%+</option>
        <option value="70">70%+</option>
        <option value="60">60%+</option>
      </select>
    </div>
    <div class="matching-grid" id="matchingGrid">
    </div>
  `;

  renderMatchingCards(records);
}

function renderMatchingCards(records) {
  const grid = document.getElementById('matchingGrid');
  if (!grid) return;

  if (records.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-state-icon">⭐</div>
        <div class="empty-state-text">Δεν βρέθηκαν matching αποτελέσματα</div>
        <div class="empty-state-sub">Τα αποτελέσματα εμφανίζονται αυτόματα όταν καταχωρηθεί νέα ζήτηση</div>
      </div>
    `;
    return;
  }

  grid.innerHTML = records.map(r => {
    const f = r.fields;
    const score = f['Σκορ %'] || 0;
    const scoreClass = score >= 100 ? 'score-100' : score >= 90 ? 'score-90' : score >= 80 ? 'score-80' : score >= 70 ? 'score-70' : 'score-60';
    const timi = f['Τιμή'] ? `€${Number(f['Τιμή']).toLocaleString('el-GR')}` : '-';
    const emvado = f['Εμβ. Μεικτό'] || f['Εμβαδό'] || '-';
    const date = f['Ημερομηνία Matching'] ? new Date(f['Ημερομηνία Matching']).toLocaleDateString('el-GR') : '-';

    // Get linked property details from lookup fields
    const getLookup = (key) => {
      const arr = f[key];
      if (Array.isArray(arr)) return arr[0] || '-';
      return arr || '-';
    };

    return `
      <div class="match-card">
        <div class="match-card-header">
          <div class="match-info">
            <div class="match-periochi">${f['ΠΕΡΙΟΧΗ'] || f['Περιοχή'] || '-'}</div>
            <div class="match-eidos">${f['ΕΙΔΟΣ ΑΚΙΝΗΤΟΥ'] || f['Είδος ακινήτου'] || '-'}</div>
          </div>
          <div class="match-score-circle ${scoreClass}">
            <span>${score}%</span>
            <span class="match-score-label">Match</span>
          </div>
        </div>
        <div class="match-card-body">
          <div class="match-timi">${timi}</div>
          <div class="match-details">
            <div class="match-detail-item">
              <div class="match-detail-label">Εμβαδό</div>
              <div class="match-detail-value">${emvado} τ.μ.</div>
            </div>
            <div class="match-detail-item">
              <div class="match-detail-label">Δωμάτια</div>
              <div class="match-detail-value">${f['ΔΩΜΑΤΙΑ'] || f['Δωμάτια'] || '-'}</div>
            </div>
            <div class="match-detail-item">
              <div class="match-detail-label">Έτος</div>
              <div class="match-detail-value">${f['ΕΤΟΣ ΚΑΤΑΣΚΕΥΗΣ'] || f['Έτος κατασκευής'] || '-'}</div>
            </div>
            <div class="match-detail-item">
              <div class="match-detail-label">Στάθμευση</div>
              <div class="match-detail-value">${f['Θέση Στάθμευσης'] || '-'}</div>
            </div>
          </div>
          <div class="score-bar-container">
            <div class="score-bar-label">
              <span>Matching Score</span>
              <span>${score}%</span>
            </div>
            <div class="score-bar">
              <div class="score-bar-fill" style="width:${score}%"></div>
            </div>
          </div>
          <div style="font-size:11px;color:var(--text-muted)">📅 ${date}</div>
        </div>
        <div class="match-card-footer">
          <button class="btn btn-primary btn-sm" onclick="viewMatchAkinito('${r.id}')">🏢 Δες Ακίνητο</button>
          <button class="btn btn-secondary btn-sm" onclick="printMatch('${r.id}')">📄 PDF</button>
          <button class="btn btn-secondary btn-sm" onclick="shareMatchViber('${r.id}')">💬 Viber</button>
        </div>
      </div>
    `;
  }).join('');
}

function filterMatching() {
  const search = (document.getElementById('matchSearch')?.value || '').toLowerCase();
  const minScore = parseInt(document.getElementById('matchScoreFilter')?.value || '0') || 0;

  let filtered = allData.matching.filter(r => {
    const score = r.fields['Σκορ %'] || 0;
    return score >= minScore;
  });

  if (search) {
    filtered = filtered.filter(r => JSON.stringify(r.fields).toLowerCase().includes(search));
  }

  filtered.sort((a,b) => (b.fields['Σκορ %']||0) - (a.fields['Σκορ %']||0));
  renderMatchingCards(filtered);
}

function viewMatchAkinito(matchId) {
  const match = allData.matching.find(r => r.id === matchId);
  if (!match) return;
  const f = match.fields;

  // Try to find the property using Ακίνητο ID
  const akinitoId = Array.isArray(f['Ακίνητο ID']) ? f['Ακίνητο ID'][0] : f['Ακίνητο ID'];
  const akinito = allData.akinita.find(r => r.id === akinitoId);

  // Build detail from lookup fields + direct akinito record
  const sourceFields = akinito ? akinito.fields : {};

  // Collect all available lookup fields from match record
  const lookupFields = Object.entries(f).filter(([k]) =>
    k.includes('(from Ακίνητο ID)') || k.includes('from ΑΚΙΝΗΤΑ')
  );

  const displayFields = akinito
    ? Object.entries(akinito.fields)
    : lookupFields.map(([k,v]) => [k.replace(' (from Ακίνητο ID)', ''), v]);

  const timi = sourceFields['Τιμή'] || f['Τιμή'] ? `€${Number(sourceFields['Τιμή']||f['Τιμή']).toLocaleString('el-GR')}` : '-';

  openModal('🏢 Στοιχεία Ακινήτου', `
    <div style="margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
          <div style="font-family:var(--font-display);font-size:24px">${f['ΠΕΡΙΟΧΗ']||f['Περιοχή']||'-'}</div>
          <div style="color:var(--text-muted)">${f['ΕΙΔΟΣ ΑΚΙΝΗΤΟΥ']||f['Είδος ακινήτου']||'-'}</div>
        </div>
        <div style="font-family:var(--font-display);font-size:28px;color:var(--accent)">${timi}</div>
      </div>
      <div class="property-detail-grid">
        ${displayFields.filter(([k,v]) => v && k !== 'User' && !k.startsWith('Name')).map(([k,v])=>`
          <div class="property-detail-item">
            <div class="property-detail-label">${k.replace(' (from Ακίνητο ID)','')}</div>
            <div class="property-detail-value">${Array.isArray(v)?v.map(x=>typeof x==='object'?x.name||x:x).join(', '):v}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div style="background:rgba(201,169,110,0.1);border-radius:var(--radius);padding:16px">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">MATCHING SCORE</div>
      <div class="score-bar">
        <div class="score-bar-fill" style="width:${f['Σκορ %']||0}%"></div>
      </div>
      <div style="text-align:right;font-size:20px;font-weight:700;color:var(--accent);margin-top:8px">${f['Σκορ %']||0}%</div>
    </div>
  `, `
    <button class="btn btn-secondary" onclick="printMatch('${matchId}')">📄 PDF</button>
    <button class="btn btn-secondary" onclick="shareMatchViber('${matchId}')">💬 Viber</button>
    <button class="btn btn-primary" onclick="closeModal()">Κλείσιμο</button>
  `);
}

function printMatch(id) {
  const match = allData.matching.find(r => r.id === id);
  if (!match) return;
  printRecordData(match.fields, 'Matching Αποτέλεσμα');
}

function shareMatchViber(id) {
  const match = allData.matching.find(r => r.id === id);
  if (!match) return;
  const f = match.fields;
  const text = `🏠 Matching Ακίνητο\n📍 ${f['ΠΕΡΙΟΧΗ']||f['Περιοχή']||''}\n🏢 ${f['ΕΙΔΟΣ ΑΚΙΝΗΤΟΥ']||f['Είδος ακινήτου']||''}\n💰 €${Number(f['Τιμή']||0).toLocaleString('el-GR')}\n⭐ Σκορ: ${f['Σκορ %']}%`;
  window.open(`viber://forward?text=${encodeURIComponent(text)}`);
}

    renderUsers(document.getElementById('pageContent'), document.getElementById('topBarActions'));
  } catch(err) {
    showToast('Σφάλμα διαγραφής', 'error');
  }
  showLoading(false);
}

// ============================================================
// PDF / PRINT / VIBER
// ============================================================
function printRecord(id, type) {
  const record = allData[type]?.find(r => r.id === id);
  if (!record) return;
  printRecordData(record.fields, type === 'akinita' ? 'Ακίνητο' : 'Ζήτηση');
}

function printRecordData(fields, title) {
  const win = window.open('', '_blank');
  const rows = Object.entries(fields)
    .filter(([k,v]) => v && k !== 'User')
    .map(([k,v]) => `
      <tr>
        <td style="font-weight:600;padding:8px 12px;border-bottom:1px solid #eee;color:#666;font-size:12px;text-transform:uppercase;letter-spacing:1px;width:40%">${k}</td>
        <td style="padding:8px 12px;border-bottom:1px solid #eee;font-size:14px">${Array.isArray(v)?v.map(x=>typeof x==='object'?x.name||x:x).join(', '):v}</td>
      </tr>
    `).join('');

  win.document.write(`
    <!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>${title}</title>
    <style>
      body{font-family:'Georgia',serif;max-width:700px;margin:40px auto;color:#1a1a2e}
      h1{font-size:28px;font-weight:300;letter-spacing:2px;border-bottom:2px solid #c9a96e;padding-bottom:16px;margin-bottom:24px}
      table{width:100%;border-collapse:collapse}
      @media print{button{display:none}}
    </style>
    </head><body>
    <h1>TerraHomes — ${title}</h1>
    <table>${rows}</table>
    <p style="margin-top:24px;font-size:12px;color:#999">Εκτυπώθηκε: ${new Date().toLocaleDateString('el-GR')}</p>
    <button onclick="window.print()" style="margin-top:16px;padding:10px 24px;background:#c9a96e;border:none;color:#fff;cursor:pointer;border-radius:8px;font-size:14px">🖨️ Εκτύπωση / PDF</button>
    </body></html>
  `);
  win.document.close();
}

function shareViber(id, type) {
  const record = allData[type]?.find(r => r.id === id);
  if (!record) return;
  const f = record.fields;
  let text = '';

  if (type === 'akinita') {
    text = `🏠 Ακίνητο προς πώληση\n📍 ${f['Περιοχή']||''}\n🏢 ${f['Είδος ακινήτου']||''}\n📐 ${f['Εμβ. Μεικτό']||''} τ.μ.\n💰 €${Number(f['Τιμή']||0).toLocaleString('el-GR')}\n🔑 ${f['Status']||''}`;
  } else {
    text = `🔍 Ζήτηση Ακινήτου\n📍 ${Array.isArray(f['Περιοχή'])?f['Περιοχή'].join(', '):f['Περιοχή']||''}\n💰 €${Number(f['Τιμή Min']||0).toLocaleString('el-GR')} - €${Number(f['Τιμή Max']||0).toLocaleString('el-GR')}`;
  }

  window.open(`viber://forward?text=${encodeURIComponent(text)}`);
}

// ============================================================
// MODAL HELPERS
// ============================================================
function openModal(title, body, footer) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFooter').innerHTML = footer || '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============================================================
// TOAST NOTIFICATIONS
// ============================================================
function showToast(msg, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `<span>${type==='success'?'✅':type==='error'?'❌':'⚠️'}</span> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

// ============================================================
// UTILITIES
// ============================================================
function showLoading(show) {
  document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
}

async function refreshData() {
  showLoading(true);
  await loadAllData();
  showLoading(false);
  showPage(currentPage);
  showToast('Δεδομένα ανανεώθηκαν!');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') {
    handleLogin();
  }
});

// ============================================================
// AUTO-LOGIN CHECK
// ============================================================
window.addEventListener('load', async function() {
  const saved = localStorage.getItem('terraUser');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      await initApp();
    } catch(e) {
      localStorage.removeItem('terraUser');
    }
  }
  showLoading(false);
});
</script>
</body>
</html>
