<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TerraHomes CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#fff; --bg2:#f8f8f8; --bg3:#f0f0f0;
  --surface:#fff; --border:#e5e5e5; --border2:#ccc;
  --text:#111; --text2:#555; --text3:#999;
  --gold:#c9a96e; --gold2:#f0e4cc;
  --ok:#16a34a; --warn:#d97706; --err:#dc2626; --inf:#2563eb;
  --r:10px; --r2:6px;
  --sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.1),0 12px 40px rgba(0,0,0,.08);
  --sb:240px; --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --t:.18s ease;
}
[data-theme=dark]{
  --bg:#0f0f0f; --bg2:#181818; --bg3:#222;
  --surface:#1a1a1a; --border:#2a2a2a; --border2:#3a3a3a;
  --text:#f0f0f0; --text2:#aaa; --text3:#666;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh}

/* ── LOGIN ── */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg2);padding:20px}
.lbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:var(--sh2)}
.l-logo{text-align:center;margin-bottom:28px}
.l-logo img{max-height:56px;max-width:200px;object-fit:contain}
.l-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
.l-title span{color:var(--gold)}
.l-sub{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.l-err{color:var(--err);font-size:12px;text-align:center;margin-top:10px;display:none;padding:8px;background:rgba(220,38,38,.08);border-radius:var(--r2)}
.l-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.l-tab{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;font-family:var(--f);transition:all var(--t)}
.l-tab.active{background:var(--text);color:var(--bg)}

/* ── FIELDS ── */
.f{margin-bottom:14px}
.f label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.f input,.f select,.f textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r2);font-family:var(--f);font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color var(--t);-webkit-appearance:none}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--gold)}
.btn-login{width:100%;padding:12px;background:var(--text);color:var(--bg);border:none;border-radius:var(--r2);font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity var(--t)}
.btn-login:hover{opacity:.85}

/* ── LAYOUT ── */
#app{display:none}
.layout{display:flex;min-height:100vh}
.sb{width:var(--sb);background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:200;transition:transform var(--t);overflow-y:auto}
.sb-logo{padding:16px;border-bottom:1px solid var(--border);cursor:pointer;text-align:center}
.sb-logo img{max-height:44px;max-width:180px;object-fit:contain}
.sb-logo-txt{font-size:17px;font-weight:700;color:var(--text)}
.sb-logo-txt span{color:var(--gold)}
.sb-logo-hint{font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.sb-user{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;overflow:hidden;background:var(--gold)}
.sb-av img{width:100%;height:100%;object-fit:cover}
.sb-uname{font-size:13px;font-weight:600}
.sb-urole{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.sb-nav{flex:1;padding:6px 0}
.sb-sec{padding:8px 14px 2px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 14px;color:var(--text2);cursor:pointer;transition:all var(--t);font-size:13px;font-weight:500;margin:1px 6px;border-radius:var(--r2);position:relative}
.sb-item:hover{background:var(--bg2);color:var(--text)}
.sb-item.active{background:var(--bg2);color:var(--text);font-weight:600}
.sb-item.active::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);width:3px;height:14px;background:var(--gold);border-radius:2px}
.sb-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center}
.sb-foot{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px}
.sb-btn{flex:1;padding:7px;background:none;border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:4px;transition:all var(--t)}
.sb-btn:hover{background:var(--bg2);color:var(--text)}
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-title{font-size:16px;font-weight:700}
.tb-right{display:flex;align-items:center;gap:8px}
.content{padding:20px}
.hamburger{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px;margin-right:4px}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:var(--r2);font-family:var(--f);font-size:13px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all var(--t);white-space:nowrap}
.btn-dark{background:var(--text);color:var(--bg)}
.btn-dark:hover{opacity:.8}
.btn-out{background:none;border:1.5px solid var(--border);color:var(--text2)}
.btn-out:hover{border-color:var(--border2);color:var(--text);background:var(--bg2)}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{opacity:.9}
.btn-err{background:rgba(220,38,38,.1);color:var(--err);border:1px solid rgba(220,38,38,.2)}
.btn-err:hover{background:rgba(220,38,38,.2)}
.btn-sm{padding:5px 10px;font-size:12px}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh);cursor:pointer;transition:all var(--t)}
.stat:hover{border-color:var(--gold);transform:translateY(-2px)}
.stat-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:30px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px}

/* ── CHARTS ── */
.charts{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.chart{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.chart-ttl{font-size:13px;font-weight:700;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;cursor:pointer}
.bar-lbl{font-size:12px;color:var(--text2);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-trk{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .8s ease}
.bar-cnt{font-size:12px;font-weight:600;color:var(--text2);width:20px;text-align:right}
.agents-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.agent-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:all var(--t)}
.agent-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.agent-cnt{font-size:26px;font-weight:700;color:var(--gold)}
.agent-name{font-size:11px;color:var(--text2);margin-top:3px}

/* ── LIST ── */
.list-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.list-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.list-ttl{font-size:15px;font-weight:700}
.list-cnt{font-size:13px;color:var(--text3)}
.srch{position:relative}
.srch input{padding:7px 10px 7px 30px;border:1.5px solid var(--border);border-radius:var(--r2);font-size:13px;background:var(--bg2);color:var(--text);outline:none;width:200px;font-family:var(--f)}
.srch input:focus{border-color:var(--gold)}
.srch-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.fltrs{padding:8px 18px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;background:var(--bg2)}
.fsel{padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--r2);font-size:12px;background:var(--surface);color:var(--text);outline:none;cursor:pointer;font-family:var(--f)}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--bg2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2);cursor:pointer}
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;white-space:nowrap}
.b-green{background:rgba(22,163,74,.1);color:#16a34a}
.b-gold{background:rgba(201,169,110,.15);color:#a07840}
.b-gray{background:var(--bg3);color:var(--text3)}
.b-red{background:rgba(220,38,38,.1);color:var(--err)}
.b-blue{background:rgba(37,99,235,.1);color:var(--inf)}
.b-orange{background:rgba(217,119,6,.1);color:var(--warn)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:700px;box-shadow:var(--sh2);animation:mIn .22s ease;margin:auto}
@keyframes mIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.m-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);border-radius:16px 16px 0 0;z-index:1}
.m-ttl{font-size:16px;font-weight:700}
.m-close{width:26px;height:26px;border-radius:50%;border:none;background:var(--bg2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.m-close:hover{background:var(--bg3)}
.m-body{padding:18px 22px;max-height:72vh;overflow-y:auto}
.m-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface);border-radius:0 0 16px 16px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fspan{grid-column:1/-1}
.modal .f input,.modal .f select,.modal .f textarea{background:var(--bg2);border:1.5px solid var(--border);color:var(--text)}
.modal .f input:focus,.modal .f select:focus,.modal .f textarea:focus{border-color:var(--gold);background:var(--bg)}

/* ── CUSTOM CHECKBOX ── */
.ck-wrap{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;user-select:none;transition:all var(--t)}
.ck-wrap:hover{border-color:var(--gold)}
.ck-wrap.on{border-color:var(--gold);background:rgba(201,169,110,.08)}
.ck-box{width:18px;height:18px;border:2px solid var(--border2);border-radius:3px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t);font-size:11px;font-weight:700}
.ck-wrap.on .ck-box{background:var(--gold);border-color:var(--gold);color:#fff}

/* ── MULTISELECT ── */
.ms{position:relative}
.ms-display{border:1.5px solid var(--border);border-radius:var(--r2);background:var(--bg2);padding:6px 10px;min-height:38px;cursor:pointer;display:flex;flex-wrap:wrap;gap:4px;align-items:center;transition:border-color var(--t)}
.ms-display:hover,.ms-display.open{border-color:var(--gold)}
.ms-tag{background:var(--gold2);color:#8a6030;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:3px}
.ms-tag button{background:none;border:none;cursor:pointer;color:#8a6030;font-size:12px;padding:0;line-height:1}
.ms-placeholder{font-size:12px;color:var(--text3)}
.ms-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh2);z-index:500;max-height:220px;overflow-y:auto}
.ms-dropdown.open{display:block}
.ms-search{padding:6px 8px;border-bottom:1px solid var(--border)}
.ms-search input{width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg);color:var(--text);outline:none;font-family:var(--f)}
.ms-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px;transition:background var(--t)}
.ms-opt:hover{background:var(--bg2)}
.ms-opt.sel{background:rgba(201,169,110,.08);font-weight:500}
.ms-opt input[type=checkbox]{width:15px;height:15px;accent-color:var(--gold);flex-shrink:0}
.ms-add-row{padding:6px 10px;border-top:1px solid var(--border);display:flex;gap:6px}
.ms-add-row input{flex:1;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;background:var(--bg);color:var(--text);outline:none;font-family:var(--f)}
.ms-add-row button{padding:4px 10px;background:var(--gold);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}

/* ── DETAIL ── */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.di{padding:9px 12px;background:var(--bg2);border-radius:var(--r2)}
.di-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.di-val{font-size:13px;font-weight:500}

/* ── SCORE CARDS ── */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:all var(--t)}
.sc:hover{box-shadow:var(--sh2);transform:translateY(-2px);border-color:var(--border2)}
.sc-head{padding:14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.sc-circle{width:50px;height:50px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;border:2px solid}
.s-green{border-color:#16a34a;color:#16a34a;background:rgba(22,163,74,.08)}
.s-blue{border-color:var(--inf);color:var(--inf);background:rgba(37,99,235,.06)}
.s-warn{border-color:var(--warn);color:var(--warn);background:rgba(217,119,6,.06)}
.s-err{border-color:var(--err);color:var(--err);background:rgba(220,38,38,.06)}
.prog{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 1s ease}

/* ── AK CARDS ── */
.ak-list{display:flex;flex-direction:column;gap:0}
.ak-card{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--t)}
.ak-card:hover{background:var(--bg2)}
.ak-card:last-child{border-bottom:none}
.ak-thumb{width:64px;height:64px;object-fit:cover;border-radius:var(--r2);flex-shrink:0;border:1px solid var(--border)}
.ak-no-photo{width:64px;height:64px;border-radius:var(--r2);flex-shrink:0;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--text3)}
.ak-info{flex:1;min-width:0}
.ak-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.ak-aa{font-size:11px;font-weight:700;color:var(--text3)}
.ak-per{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ak-agent{font-size:11px;color:var(--text3);margin-top:2px}
.ak-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.ak-timi{font-size:15px;font-weight:700;color:var(--gold)}
.ak-emv{font-size:11px;color:var(--text3)}
@media(max-width:480px){
  .ak-thumb,.ak-no-photo{width:52px;height:52px}
  .ak-per{font-size:13px}
  .ak-timi{font-size:14px}
}

/* ── SETTINGS ── */
.set-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px}
.set-ttl{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.opt-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.opt-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;font-size:12px}
.opt-chip button{background:none;border:none;cursor:pointer;color:var(--err);font-size:14px;padding:0;line-height:1;font-weight:700}
.opt-chip button:hover{color:var(--err)}
.opt-add{display:flex;gap:8px;margin-top:8px}
.opt-add input{flex:1;padding:7px 12px;border:1.5px solid var(--border);border-radius:var(--r2);font-size:13px;background:var(--bg2);color:var(--text);outline:none;font-family:var(--f)}
.opt-add input:focus{border-color:var(--gold)}

/* ── TOAST ── */
.toasts{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 14px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:var(--sh2);animation:tIn .25s ease;display:flex;align-items:center;gap:8px;max-width:280px}
.t-s{background:#16a34a;color:#fff}
.t-e{background:var(--err);color:#fff}
.t-i{background:var(--text);color:var(--bg)}
@keyframes tIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}

/* ── LOADER ── */
.loader{position:fixed;inset:0;background:rgba(255,255,255,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998}
[data-theme=dark] .loader{background:rgba(0,0,0,.88)}
.spin{width:30px;height:30px;border:2.5px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-ic{font-size:36px;margin-bottom:10px;opacity:.4}
.empty-tx{font-size:14px;font-weight:500;margin-bottom:3px}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
.sb-ov.open{display:block}

@media(max-width:768px){
  .sb{transform:translateX(-100%)}
  .sb.open{transform:translateX(0);box-shadow:var(--sh2)}
  .main{margin-left:0}
  .hamburger{display:flex}
  .content{padding:14px}
  .stats{grid-template-columns:1fr 1fr;gap:10px}
  .charts{grid-template-columns:1fr}
  .fg{grid-template-columns:1fr}
  .dg{grid-template-columns:1fr}
  .sg{grid-template-columns:1fr}
  .topbar{padding:0 14px}
  .srch input{width:150px}
}

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY.preset);
  const res = await fetch(CLOUDINARY.uploadUrl, { method: 'POST', body: fd });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.secure_url;
}

async function uploadFiles(inputId, progressId) {
  const input = document.getElementById(inputId);
  if (!input || !input.files.length) return [];
  const urls = [];
  const prog = document.getElementById(progressId);
  for (let i = 0; i < input.files.length; i++) {
    const file = input.files[i];
    if (prog) prog.textContent = `Ανέβασμα ${i+1}/${input.files.length}...`;
    try {
      const url = await uploadToCloudinary(file);
      urls.push(url);
    } catch(e) { console.error('Upload error:', e); toast('Σφάλμα ανεβάσματος: '+file.name,'e'); }
  }
  if (prog) prog.textContent = '';
  return urls;
}

function switchTab(tab) {

}

async function doLogin() {
  const email = document.getElementById('lEmail').value.trim();
  const pass = document.getElementById('lPass').value;
  if (!email||!pass) { showErr('Συμπλήρωσε email και κωδικό'); return; }
  load(true);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { showErr('Λάθος email ή κωδικός'); load(false); return; }
  await boot(data.user);
  load(false);
}

async function doReset() {
  const email = document.getElementById('rEmail').value.trim();
  if (!email) { showErr('Βάλε το email σου'); return; }
  load(true);
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.href
  });
  load(false);
  if (error) { showErr('Σφάλμα αποστολής'); return; }
  showErr('✅ Στάλθηκε link επαναφοράς στο email σου!');

async function doSignup() {
  const name = document.getElementById('sName').value.trim();
  const email = document.getElementById('sEmail').value.trim();
  const phone = document.getElementById('sPhone').value.trim();
  const pass = document.getElementById('sPass').value;
  const pass2 = document.getElementById('sPass2').value;

  if (!name) { showErr('Συμπλήρωσε το ονοματεπώνυμό σου'); return; }
  if (!email) { showErr('Συμπλήρωσε το email σου'); return; }
  if (!pass || pass.length < 6) { showErr('Ο κωδικός πρέπει να έχει τουλάχιστον 6 χαρακτήρες'); return; }
  if (pass !== pass2) { showErr('Οι κωδικοί δεν ταιριάζουν'); return; }

  load(true);
  try {
    // Create auth user
    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error) { showErr('Σφάλμα: ' + error.message); load(false); return; }

    // Create user profile (inactive, role=agent by default)
    const { error: profileErr } = await sb.from('users').insert({
      auth_id: data.user?.id,
      name,
      email,
      phone: phone||null,
      role: 'agent',
      active: false  // Needs admin activation
    });

    if (profileErr) { showErr('Σφάλμα δημιουργίας προφίλ'); load(false); return; }

    // Show success
    const errEl = document.getElementById('lErr');
    errEl.textContent = '✅ Η εγγραφή ολοκληρώθηκε! Περίμενε να ενεργοποιηθεί ο λογαριασμός σου από τον admin.';
    errEl.style.display = 'block';
    errEl.style.color = 'var(--ok)';
    errEl.style.background = 'rgba(22,163,74,0.08)';

    // Clear form
    ['sName','sEmail','sPhone','sPass','sPass2'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.value='';
    });
  } catch(e) {
    showErr('Σφάλμα εγγραφής: ' + e.message);
  }
  load(false);
}

}

async function boot(authUser) {
  // Get user profile
  console.log('Auth user ID:', authUser.id);
  const { data: profile, error: profileErr } = await sb.from('users').select('*').eq('auth_id', authUser.id).single();
  console.log('Profile:', profile, 'Error:', profileErr);
  if (!profile) {
    // Try by email as fallback
    const { data: profileByEmail } = await sb.from('users').select('*').eq('email', authUser.email).single();
    if (!profileByEmail) { showErr('Δεν βρέθηκε προφίλ χρήστη. Επικοινώνησε με admin.'); return; }
    // Update auth_id
    await sb.from('users').update({auth_id: authUser.id}).eq('email', authUser.email);
    Object.assign(profileByEmail, {auth_id: authUser.id});
    arguments[0] = profileByEmail;
  }
  const finalProfile = profile || (await sb.from('users').select('*').eq('email', authUser.email).single()).data;
  if (!finalProfile) { showErr('Δεν βρέθηκε προφίλ χρήστη.'); return; }
  if (!finalProfile.active) { showErr('Ο λογαριασμός σας είναι ανενεργός.'); await sb.auth.signOut(); return; }

  ME = { ...finalProfile, auth_id: authUser.id };

  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('sbName').textContent = ME.name;
  document.getElementById('sbRole').textContent = ME.role.toUpperCase();

  // Avatar
  const av = document.getElementById('sbAv');

  else av.textContent = ME.name.charAt(0).toUpperCase();

  // Hide admin items
  if (ME.role !== 'admin') {
    document.querySelectorAll('.admin-only').forEach(e => e.style.display='none');

  loadTheme(); loadLogo();
  load(true);
  await loadAll();
  load(false);
  goP('home', document.querySelector('.sb-item[data-p="home"]'));
}

async function loadAll() {
  try {
    const [akRes, ziRes, katRes, usRes, optsRes] = await Promise.all([
      sb.from('akinita').select('*').order('imerominia', {ascending:false}),
      sb.from('zitiseis').select('*').order('imerominia', {ascending:false}),
      sb.from('kataskevastes').select('*').order('created_at', {ascending:false}),
      ME?.role==='admin' ? sb.from('users').select('*').order('active', {ascending:false}).order('name') : sb.from('users').select('*').eq('active', true).order('name'),
      sb.from('options').select('*').eq('active', true).order('field_name').order('value')
    ]);
    DB.ak = akRes.data || [];
    DB.zi = ziRes.data || [];
    DB.kat = katRes.data || [];
    DB.users = usRes.data || [];

    // Group options by field_name
    DB.opts = {};
    (optsRes.data||[]).forEach(o => {
      if (o.field_name === '__WEIGHTS__') {
        // Load custom weights
        try { const w=JSON.parse(o.value); if(w) Object.assign(WEIGHTS, w); } catch(e){}
        return;
      }
      if (!DB.opts[o.field_name]) DB.opts[o.field_name] = [];
      DB.opts[o.field_name].push(o.value);
    });
  } catch(e) { toast('Σφάλμα φόρτωσης','e'); console.error(e); }
}

  tb.innerHTML=recs.map(r=>{
    const photo=r.photos&&r.photos[0]?r.photos[0]:null;
    return`<div class="ak-card" onclick="viewAk('${r.id}')">

function filterAk() {
  const s=(document.getElementById('akSrch')?.value||'').toLowerCase();

  const pe=document.getElementById('fPe')?.value||'';
  let r=myAk();
  if(s) r=r.filter(x=>JSON.stringify(x).toLowerCase().includes(s));

}

function calcAmoivi() {
  const timi = parseFloat(document.getElementById('a_ti')?.value)||0;
  const pct  = parseFloat(document.getElementById('a_amoivi_pct')?.value)||2;
  const el   = document.getElementById('a_amoivi_result');
  if (!el) return;
  if (timi > 0) {
    const amoivi = Math.round(timi * pct / 100);
    el.textContent = amoivi.toLocaleString('el-GR') + ' €';
  } else {
    el.textContent = '—';
  }
}
function calcTM(t, e) {
  if (!t) t = parseFloat(document.getElementById('a_ti')?.value)||0;
  if (!e) e = parseFloat(document.getElementById('a_em')?.value)||0;
  const el = document.getElementById('a_tm');
  if (el) el.value = (t>0&&e>0) ? (t/e).toLocaleString('el-GR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €/τ.μ.' : '';
calcAmoivi();
}

// ── LIVE MATCHING ─────────────────────────────────────────────
function calcScore(z, r) {
  const stathScore={'Κλειστή':15,'Πυλωτή':10,'Ανοιχτή':5,'Ναι':5,'Όχι':0};
  const W = WEIGHTS;
  const breakdown = [];

  // Base (always 50 if passed primary check)
  breakdown.push({
    label: 'Περιοχή + Είδος + Τιμή',
    max: W.base.value,
    got: W.base.value,
    ok: true
  });

  // Εμβαδό
  const emv=parseFloat(r.emvado_meikto)||0;
  const emvMin=parseFloat(z.emvado_min)||0, emvMax=parseFloat(z.emvado_max)||999999;
  const emvOk = emvMin===0&&emvMax===999999 ? true : (emv>=emvMin&&emv<=emvMax);
  breakdown.push({label:'Εμβαδό', max:W.emvado.value, got:emvOk?W.emvado.value:0, ok:emvOk});

  // Δωμάτια
  const domOk = !z.domatia || r.domatia===z.domatia;
  breakdown.push({label:'Δωμάτια', max:W.domatia.value, got:domOk?W.domatia.value:0, ok:domOk});

  // Έτος
  const etos=parseInt(r.etos_kataskeyis)||0;
  const eMin=parseInt(z.apo_etos)||0, eMax=parseInt(z.eos_etos)||9999;
  const etosOk = eMin===0&&eMax===9999 ? true : (etos>=eMin&&etos<=eMax);
  breakdown.push({label:'Έτος κατασκευής', max:W.etos.value, got:etosOk?W.etos.value:0, ok:etosOk});

  // Στάθμευση
  const aStath=r.thesi_stathmeysis||'Όχι';
  const zStath=z.thesi_stathmeysis||'';
  let stathGot=0;
  if(!zStath){stathGot=Math.min(stathScore[aStath]||0,W.stathm.value);}
  else{const zSc=stathScore[zStath]||0,aSc=stathScore[aStath]||0;stathGot=aSc>=zSc?W.stathm.value:aSc>0?Math.round(W.stathm.value/2):0;}
  breakdown.push({label:'Θέση Στάθμευσης', max:W.stathm.value, got:stathGot, ok:stathGot>=W.stathm.value, val:aStath});

  // Αποθήκη
  const apOk = !z.apothiki||z.apothiki==='Όχι'||r.apothiki==='Ναι';
  breakdown.push({label:'Αποθήκη', max:W.apothiki.value, got:apOk?W.apothiki.value:0, ok:apOk});

  const total = Math.min(breakdown.reduce((s,b)=>s+b.got,0), 100);
  return {score:total, breakdown};
}

function findMatching(z) {
  const zPer = Array.isArray(z.periochi)?z.periochi:(z.periochi?[z.periochi]:[]);
  const zEi = Array.isArray(z.eidos)?z.eidos:(z.eidos?[z.eidos]:[]);
  const tMin=parseFloat(z.timi_min)||0, tMax=parseFloat(z.timi_max)||999999999;

  return DB.ak.filter(r=>['Διαθέσιμο','Off Market'].includes(r.status)).map(r=>{
    const perOk=zPer.length===0||zPer.includes(r.periochi);
    const eiOk=zEi.length===0||zEi.includes(r.eidos);
    const timi=parseFloat(r.timi)||0;
    const timiOk=timi>=tMin&&timi<=tMax;
    if(!perOk||!eiOk||!timiOk) return null;
    const {score,breakdown}=calcScore(z,r);
    return {...r, score, breakdown};
  }).filter(Boolean).sort((a,b)=>b.score-a.score);
}

// ── MATCHING PAGE ─────────────────────────────────────────────
function pgMatching(C, A) {
  A.innerHTML=`<button class="btn btn-out btn-sm" onclick="doRefresh()">↻</button>`;
  const zi=myZi();
  const allMatches=[];
  zi.forEach(z=>{
    const m=findMatching(z);
    m.forEach(ak=>allMatches.push({zi:z,ak,score:ak.score}));
  });
  allMatches.sort((a,b)=>b.score-a.score);

  if(!allMatches.length){C.innerHTML=`<div class="empty"><div class="empty-ic">⭐</div><div class="empty-tx">Δεν βρέθηκαν αποτελέσματα</div><div style="font-size:12px;color:var(--text3);margin-top:8px">Προσθέστε ζητήσεις για να δείτε matching ακίνητα</div></div>`;return;}

  C.innerHTML=`
    <div style="margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap">
      <div class="srch"><span class="srch-ic">🔍</span><input placeholder="Αναζήτηση..." id="maSrch" oninput="filterMa()" style="width:200px"></div>
      <select class="fsel" id="maMin" onchange="filterMa()"><option value="0">Όλα τα σκορ</option><option value="90">90%+</option><option value="80">80%+</option><option value="70">70%+</option><option value="60">60%+</option></select>
    </div>
    <div class="sg" id="maGrid"></div>`;
  renderMaCards(allMatches);
}

function renderMaCards(matches) {
  const g=document.getElementById('maGrid'); if(!g) return;
  if(!matches.length){g.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-ic">⭐</div><div class="empty-tx">Δεν βρέθηκαν αποτελέσματα</div></div>`;return;}
  g.innerHTML=matches.slice(0,50).map(({zi,ak,score})=>{
    const cls=score>=90?'s-green':score>=80?'s-blue':score>=70?'s-warn':'s-err';
    return`<div class="sc" onclick="viewAk('${ak.id}')">
      <div class="sc-head">
        <div style="flex:1;padding-right:10px">
          <div style="font-size:15px;font-weight:700">${ak.periochi||'—'}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${ak.eidos||'—'}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">Ζήτηση #${zi.aa||''} · ${getAgentName(zi.user_id)}</div>
        </div>
        <div class="sc-circle ${cls}"><span>${score}%</span><span style="font-size:8px;text-transform:uppercase">match</span></div>
      </div>
      <div style="padding:12px 14px">
        <div style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:8px">${fmtEuro(ak.timi)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
          <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Εμβαδό</div><div style="font-size:12px;font-weight:600">${ak.emvado_meikto?ak.emvado_meikto+' τ.μ.':'—'}</div></div>
          <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Δωμάτια</div><div style="font-size:12px;font-weight:600">${ak.domatia||'—'}</div></div>
          <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Στάθμευση</div><div style="font-size:12px;font-weight:600">${ak.thesi_stathmeysis||'—'}</div></div>
          <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Status</div><div><span class="badge ${statusColors[ak.status]||'b-gray'}">${ak.status||'—'}</span></div></div>
        </div>
        <div class="prog"><div class="prog-fill" style="width:${score}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

function filterMa() {
  const s=(document.getElementById('maSrch')?.value||'').toLowerCase();
  const min=parseInt(document.getElementById('maMin')?.value||'0')||0;
  const zi=myZi();
  let all=[];
  zi.forEach(z=>{findMatching(z).filter(ak=>ak.score>=min).forEach(ak=>all.push({zi:z,ak,score:ak.score}));});
  all.sort((a,b)=>b.score-a.score);
  if(s) all=all.filter(m=>JSON.stringify(m.ak).toLowerCase().includes(s)||JSON.stringify(m.zi).toLowerCase().includes(s));
  renderMaCards(all);
}

async function saveUser(id){
  const name=document.getElementById('u_n').value;
  const email=document.getElementById('u_e').value;
  const pass=document.getElementById('u_p').value;
  const phone=document.getElementById('u_ph').value;
  const role=document.getElementById('u_r').value;
  const active=document.getElementById('u_act').checked;

  if(!id && (!email||!pass)){toast('Email και κωδικός είναι υποχρεωτικά','e');return;}

  load(true);
  try {
    // Upload photo if selected
    let photo_url = document.getElementById('u_photo_existing')?.value||null;
    const newPhotos = await uploadFiles('u_photo','u_photo_prog');
    if(newPhotos.length) photo_url = newPhotos[0];
    if(!id) {
      // Create auth user
      const {data:authData, error:authErr} = await sb.auth.admin?.createUser({
        email, password:pass, email_confirm:true
      });
      if(authErr) {
        // Fallback: user must sign up themselves
        toast('Ο χρήστης πρέπει να εγγραφεί μόνος του με αυτό το email','i');
        // Just create profile
        await sb.from('users').insert({name,email,phone,role,active,photo_url});
      } else {
        await sb.from('users').insert({auth_id:authData.user.id,name,email,phone,role,active,photo_url});

function updateWeightTotal() {
  const editable = Object.keys(WEIGHTS).filter(k=>!WEIGHTS[k].locked);
  const total = WEIGHTS.base.value + editable.reduce((s,k)=>{
    const el=document.getElementById('w_'+k);
    return s+(el?parseInt(el.value)||0:WEIGHTS[k].value);
  },0);
  const el=document.getElementById('weightTotal');
  if(el){el.textContent=total+'%';el.style.color=total===100?'var(--ok)':'var(--err)';}
}

async function saveWeights() {
  const editable=Object.keys(WEIGHTS).filter(k=>!WEIGHTS[k].locked);
  const total=WEIGHTS.base.value+editable.reduce((s,k)=>{const el=document.getElementById('w_'+k);return s+(el?parseInt(el.value)||0:0);},0);
  if(total!==100){toast('Το σύνολο πρέπει να είναι 100%','e');return;}
  editable.forEach(k=>{const el=document.getElementById('w_'+k);if(el)WEIGHTS[k].value=parseInt(el.value)||0;});
  try {
    await sb.from('options').upsert({field_name:'__WEIGHTS__',value:JSON.stringify(WEIGHTS),active:true},{onConflict:'field_name,value'});
    toast('Βάρη αποθηκεύτηκαν!','s');
  } catch(e){toast('Σφάλμα αποθήκευσης','e');}
}

async function resetWeights() {
  if(!confirm('Επαναφορά στις προεπιλεγμένες τιμές;')) return;
  WEIGHTS = {...DEFAULT_WEIGHTS};
  await sb.from('options').delete().eq('field_name','__WEIGHTS__');
  toast('Επαναφορά ολοκληρώθηκε!','s');
  pgSettings(document.getElementById('pgContent'),document.getElementById('tbRight'));
}

async function addOpt(fieldName) {
  const inp=document.getElementById('optInp_'+fieldName);
  if(!inp||!inp.value.trim())return;
  const val=inp.value.trim();
  try{
    await sb.from('options').upsert({field_name:fieldName,value:val,active:true},{onConflict:'field_name,value'});
    await loadAll();
    const list=document.getElementById('optList_'+fieldName);
    if(list){const chip=document.createElement('div');chip.className='opt-chip';chip.innerHTML=`<span>${val}</span><button onclick="delOpt('${fieldName}','${val.replace(/'/g,"\\'")}')">×</button>`;list.appendChild(chip);}
    inp.value='';toast(`"${val}" προστέθηκε!`,'s');
  }catch(e){toast('Σφάλμα','e');}
}
async function delOpt(fieldName,val){
  try{
    await sb.from('options').delete().eq('field_name',fieldName).eq('value',val);
    await loadAll();toast('Διαγράφηκε','s');
    document.querySelectorAll('#optList_'+fieldName+' .opt-chip').forEach(chip=>{if(chip.querySelector('span')?.textContent===val)chip.remove();});
  }catch(e){toast('Σφάλμα','e');}
}

  
function pgSettings(C, A, activeTab='options') {
  if(ME.role!=='admin'){C.innerHTML='<div class="empty"><div class="empty-ic">🔒</div><div class="empty-tx">Δεν έχεις πρόσβαση</div></div>';return;}

  const fieldGroups = [
    {key:'ΠΕΡΙΟΧΗ', label:'Περιοχές'},
    {key:'ΕΙΔΟΣ', label:'Είδος Ακινήτου'},
    {key:'ΔΩΜΑΤΙΑ', label:'Δωμάτια'},
    {key:'ΟΡΟΦΟΣ', label:'Όροφος'},
    {key:'ΑΣΑΝΣΕΡ', label:'Ασανσέρ'},
    {key:'ΘΕΣΗ_ΣΤΑΘΜΕΥΣΗΣ', label:'Θέση Στάθμευσης'},
    {key:'ΑΠΟΘΗΚΗ', label:'Αποθήκη'},
    {key:'STATUS', label:'Status Ακινήτου'},
    {key:'ΤΡΟΠΟΣ_ΠΛΗΡΩΜΗΣ', label:'Τρόπος Πληρωμής'},
    {key:'ΕΙΔΙΚΑ_ΧΑΡΑΚΤΗΡΙΣΤΙΚΑ', label:'Ειδικά Χαρακτηριστικά'},
  ];

  const tabsHTML = `<div class="l-tabs" style="margin-bottom:20px;max-width:400px">
    <button class="l-tab ${activeTab==='options'?'active':''}" onclick="goP('settings',null,'options')">📋 Επιλογές</button>
    <button class="l-tab ${activeTab==='weights'?'active':''}" onclick="goP('settings',null,'weights')">⚖️ Βάρη Matching</button>
  </div>`;

  let bodyHTML = '';

  if (activeTab === 'options') {
    bodyHTML = '<div style="margin-bottom:16px"><p style="color:var(--text2);font-size:13px">Διαχείριση επιλογών για τα dropdown πεδία.</p></div>';
    bodyHTML += fieldGroups.map(g => {
      const chips = (opts(g.key)||[]).map(v =>
        `<div class="opt-chip"><span>${v}</span><button onclick="delOpt('${g.key}','${v.replace(/'/g,"\'")}')">×</button></div>`
      ).join('');
      return `<div class="set-card">
        <div class="set-ttl"><span>${g.label}</span><span style="font-size:11px;color:var(--text3)">${(opts(g.key)||[]).length} επιλογές</span></div>
        <div class="opt-list" id="optList_${g.key}">${chips}</div>
        <div class="opt-add">
          <input type="text" id="optInp_${g.key}" placeholder="Νέα επιλογή..." onkeydown="if(event.key==='Enter')addOpt('${g.key}')">
          <button class="btn btn-gold btn-sm" onclick="addOpt('${g.key}')">+ Προσθήκη</button>
        </div>
      </div>`;
    }).join('');
  } else {
    // Weights tab
    const weightsRows = Object.entries(WEIGHTS).map(([k,w]) => {
      const inp = w.locked
        ? `<span style="font-size:13px;font-weight:700;color:var(--gold);width:60px;text-align:right">${w.value}% 🔒</span>`
        : `<input type="number" id="w_${k}" value="${w.value}" min="0" max="50" style="width:60px;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--r2);font-size:13px;text-align:center;background:var(--bg2);color:var(--text);outline:none" oninput="updateWeightTotal()"><span style="font-size:11px;color:var(--text3)">%</span>`;
      return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="flex:1;font-size:13px">${w.label}</span>${inp}
      </div>`;
    }).join('');

    bodyHTML = `<div class="set-card">
      <div class="set-ttl">
        <span>⚖️ Βάρη Matching Score</span>
        <button class="btn btn-out btn-sm" onclick="resetWeights()">↺ Επαναφορά</button>
      </div>
      <p style="font-size:12px;color:var(--text2);margin-bottom:14px">Ορίστε τη βαρύτητα κάθε κριτηρίου. Το σύνολο πρέπει να είναι 100%.</p>
      <div id="weightsUI">
        ${weightsRows}
        <div style="padding:10px 12px;background:var(--bg2);border-radius:var(--r2);display:flex;justify-content:space-between;margin-top:6px">
          <span style="font-size:13px;font-weight:600">Σύνολο</span>
          <span id="weightTotal" style="font-size:14px;font-weight:700;color:var(--gold)">100%</span>
        </div>
        <button class="btn btn-dark" style="margin-top:12px;width:100%" onclick="saveWeights()">💾 Αποθήκευση Βαρών</button>
      </div>
    </div>`;
  }

  C.innerHTML = tabsHTML + bodyHTML;
}

        <div class="ms-search"><input type="text" placeholder="Αναζήτηση..." oninput="filterMS('${id}',this.value)" onclick="event.stopPropagation()"></div>
        <div id="msol_${id}">
          ${options.map(o=>`<div class="ms-opt ${selArr.includes(o)?'sel':''}" onclick="event.stopPropagation();tgTag('${id}','${o.replace(/'/g,"\\'")}')">
            <input type="checkbox" ${selArr.includes(o)?'checked':''} onclick="event.stopPropagation();tgTag('${id}','${o.replace(/'/g,"\\'")}')"> ${o}
          </div>`).join('')}
        </div>
        ${allowNew?`<div class="ms-add-row"><input type="text" id="msn_${id}" placeholder="+ Νέα επιλογή" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter'){event.preventDefault();addMSOpt('${id}');}"><button onclick="event.stopPropagation();addMSOpt('${id}')">+</button></div>`:''}
      </div>
      <input type="hidden" id="msv_${id}" value="${selArr.join('||')}">
    </div>`;
}

function toggleMS(id){
  const dd=document.getElementById('mso_'+id);
  const disp=document.getElementById('msd_'+id);
  if(!dd) return;
  const isOpen=dd.classList.contains('open');
  document.querySelectorAll('.ms-dropdown.open').forEach(el=>{el.classList.remove('open');document.getElementById('msd_'+el.id.replace('mso_',''))?.classList.remove('open');});
  if(!isOpen){dd.classList.add('open');disp.classList.add('open');}
}

function filterMS(id, q) {
  const list=document.getElementById('msol_'+id);if(!list) return;
  const lq=q.toLowerCase();
  list.querySelectorAll('.ms-opt').forEach(opt=>{opt.style.display=opt.textContent.trim().toLowerCase().includes(lq)?'':'none';});
}

function tgTag(id, val) {
  const hid=document.getElementById('msv_'+id);if(!hid) return;
  let vals=hid.value?hid.value.split('||').filter(Boolean):[];
  const idx=vals.indexOf(val);
  if(idx>=0) vals.splice(idx,1); else vals.push(val);
  hid.value=vals.join('||');
  refreshMSTags(id,vals);
  const dd=document.getElementById('mso_'+id);
  if(dd) dd.querySelectorAll('.ms-opt').forEach(opt=>{
    const lbl=opt.textContent.trim();
    opt.classList.toggle('sel',vals.includes(lbl));
    const cb=opt.querySelector('input[type=checkbox]');
    if(cb) cb.checked=vals.includes(lbl);
  });
}

function rmTag(id,val){tgTag(id,val);}

function refreshMSTags(id,vals){
  const el=document.getElementById('mst_'+id);if(!el) return;
  el.innerHTML=vals.map(v=>`<span class="ms-tag">${v}<button type="button" onclick="event.stopPropagation();rmTag('${id}','${v.replace(/'/g,"\\'")}')">×</button></span>`).join('')+(!vals.length?`<span class="ms-placeholder">Κλικ για επιλογή...</span>`:'');
}

async function addMSOpt(id) {
  const inp=document.getElementById('msn_'+id);if(!inp||!inp.value.trim()) return;
  const val=inp.value.trim();
  // Map MS id to options field
  const fieldMap={'z_per':'ΠΕΡΙΟΧΗ','z_ei':'ΕΙΔΟΣ','z_xar':'ΕΙΔΙΚΑ_ΧΑΡΑΚΤΗΡΙΣΤΙΚΑ','a_tr':'ΤΡΟΠΟΣ_ΠΛΗΡΩΜΗΣ','z_tr':'ΤΡΟΠΟΣ_ΠΛΗΡΩΜΗΣ','z_or':'ΟΡΟΦΟΣ'};
  const field=fieldMap[id];
  if(field) {
    try { await sb.from('options').upsert({field_name:field,value:val,active:true},{onConflict:'field_name,value'}); await loadAll(); toast(`"${val}" αποθηκεύτηκε!`,'s'); }
    catch(e){console.warn(e);}
  }
  // Add to dropdown
  const dd=document.getElementById('mso_'+id);
  const addRow=dd?.querySelector('.ms-add-row');
  if(dd&&addRow){
    const newOpt=document.createElement('div');
    newOpt.className='ms-opt';
    newOpt.innerHTML=`<input type="checkbox"> ${val}`;
    newOpt.onclick=(e)=>{e.stopPropagation();tgTag(id,val);};
    newOpt.querySelector('input').onclick=(e)=>{e.stopPropagation();tgTag(id,val);};
    dd.querySelector('#msol_'+id)?.appendChild(newOpt);
  }
  tgTag(id,val);
  inp.value='';
}

function getMS(id){const hid=document.getElementById('msv_'+id);if(!hid||!hid.value)return[];return hid.value.split('||').filter(Boolean);}

// ── CHECKBOX ──────────────────────────────────────────────────
function mkCk(id,lbl,checked){
  return`<div class="ck-wrap${checked?' on':''}" id="ck_${id}" onclick="toggleCk('${id}')">
    <div class="ck-box">${checked?'✓':''}</div>
    <input type="checkbox" id="${id}" ${checked?'checked':''} style="display:none">
    <span class="ck-lbl">${lbl}</span>
  </div>`;
}
function toggleCk(id){
  const w=document.getElementById('ck_'+id);const cb=document.getElementById(id);if(!w||!cb)return;
  const on=!w.classList.contains('on');
  w.classList.toggle('on',on);cb.checked=on;
  w.querySelector('.ck-box').textContent=on?'✓':'';
}

function getLogoSrc(){
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  const custom = localStorage.getItem('crm_logo');
  return custom || (isDark ? TH_LOGO_DARK : TH_LOGO_LIGHT);
}
function triggerLogo(){document.getElementById('logoFile').click();}
function handleLogo(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{localStorage.setItem('crm_logo',e.target.result);applyLogo(e.target.result);toast('Logo ανανεώθηκε!','s');};
  reader.readAsDataURL(file);
}
function applyLogo(src){
  const logoSrc=src||getLogoSrc();
  const sb2=document.getElementById('sbLogo');if(sb2)sb2.innerHTML=`<img src="${logoSrc}" style="max-height:44px;max-width:180px;object-fit:contain">`;
  const ll=document.getElementById('loginLogo');if(ll)ll.innerHTML=`<img src="${logoSrc}" style="max-height:56px;max-width:200px;object-fit:contain">`;
}
function loadLogo(){
  applyLogo(getLogoSrc());
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{
    if(!localStorage.getItem('crm_logo')) applyLogo(getLogoSrc());
  });
  const _orig=window.toggleTheme;
  window.toggleTheme=function(){_orig&&_orig();setTimeout(()=>{if(!localStorage.getItem('crm_logo'))applyLogo(getLogoSrc());},50);};
}


// ── THEME ─────────────────────────────────────────────────────
function toggleTheme(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'light':'dark');
  localStorage.setItem('crm_theme',dark?'light':'dark');
  document.getElementById('themeBtn').textContent=dark?'🌙':'☀️';
}
function loadTheme(){
  const t=localStorage.getItem('crm_theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  const btn=document.getElementById('themeBtn');if(btn)btn.textContent=t==='dark'?'☀️':'🌙';
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(t,b,ft=''){
  document.getElementById('mTtl').textContent=t;
  document.getElementById('mBody').innerHTML=b;
  document.getElementById('mFoot').innerHTML=ft;
  document.getElementById('overlay').classList.add('open');
}
function CM(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)CM();});
document.addEventListener('click',e=>{
  if(!e.target.closest('.ms'))document.querySelectorAll('.ms-dropdown.open,.ms-display.open').forEach(el=>el.classList.remove('open'));
});

// ── TOAST ─────────────────────────────────────────────────────
function toast(m,t='i'){
  const c=document.getElementById('toasts'),el=document.createElement('div');
  el.className=`toast t-${t}`;el.innerHTML=`<span>${t==='s'?'✓':t==='e'?'✕':'ℹ'}</span> ${m}`;
  c.appendChild(el);setTimeout(()=>el.remove(),3200);
}

// ── LOADER ────────────────────────────────────────────────────
function load(s){document.getElementById('loader').style.display=s?'flex':'none';}

// ── SIDEBAR ───────────────────────────────────────────────────
function toggleSB(){document.getElementById('sb').classList.toggle('open');document.getElementById('sbOv').classList.toggle('open');}
function closeSB(){document.getElementById('sb').classList.remove('open');document.getElementById('sbOv').classList.remove('open');}

// ── KEYBOARD ──────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')CM();
  if(e.key==='Enter'&&document.getElementById('loginPage').style.display!=='none'){
    if(document.getElementById('loginForm').style.display!=='none')doLogin();
    else doReset();
  }
});

// ── AUTO LOGIN ────────────────────────────────────────────────
window.addEventListener('load', async()=>{
  load(true);
  const {data:{session}} = await sb.auth.getSession();
  if(session?.user) {
    await boot(session.user);
  }
  load(false);
});
</script>
</body>

<script>
// ════════════════════════════════════════════
// ΡΥΘΜΙΣΗ — Αλλάξτε το URL με το δικό σας Netlify
// ════════════════════════════════════════════
const IPODIKSI_FORM_URL = 'https://soft-mermaid-9d5952.netlify.app/ipodiksi-form-v2';

// ════════════════════════════════════════════
// Φόρτωση QR Library
// ════════════════════════════════════════════
(function(){
  if(window.QRCode) return;
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  document.head.appendChild(s);
})();

// ════════════════════════════════════════════
// Άνοιγμα modal QR για συγκεκριμένο ακίνητο
// ════════════════════════════════════════════
function openIpodiksiQR(akId) {
  const r = DB.ak.find(x => x.id === akId);
  if (!r) return;

  const agentObj   = DB.users ? DB.users.find(u => u.id === r.user_id) : null;
  const agentName  = agentObj ? (agentObj.full_name || agentObj.name || agentObj.email) : (ME?.full_name || ME?.name || '');
  const agentEmail = agentObj ? agentObj.email : (ME?.email || 'ksaris1@hotmail.com');

  const amoiviPct  = r.amoivi_pct || 2;
  const amoiviEuro = r.timi ? Math.round(r.timi * amoiviPct / 100) : 0;
  const amoiviStr  = amoiviEuro > 0 ? amoiviEuro.toLocaleString('el-GR') + '€' : '—';
  const amoiviOlog = amoiviEuro > 0 ? euroToWordsGR(amoiviEuro) : '—';

  const showIdio   = r.idioktitis && r.idioktitis_show_ipodiksi && r.user_id === ME.id;
  const idioktitis = showIdio ? r.idioktitis : '';

  const params = new URLSearchParams();
  if (r.aa || r.id)       params.set('pid',   r.aa || r.id);
  if (r.kwd_akinitou)     params.set('kwd',   r.kwd_akinitou);
  if (r.periochi)         params.set('addr',  r.periochi + (r.diefthinsi ? ', ' + r.diefthinsi : ''));
  if (r.eidos)            params.set('type',  r.eidos);
  if (r.orofos)           params.set('floor', r.orofos);
  if (r.domatia)          params.set('rooms', r.domatia);
  if (r.timi)             params.set('price', fmtEuro(r.timi));
  if (amoiviEuro > 0)     params.set('amoivi', amoiviStr);
  if (amoiviOlog !== '—') params.set('amoivi_olog', amoiviOlog.toUpperCase());
  if (idioktitis)         params.set('idioktitis', idioktitis);
  if (agentName)          params.set('agent', agentName);
  if (agentEmail)         params.set('aemail', agentEmail);
  params.set('date',   new Date().toLocaleDateString('el-GR'));
  params.set('office', 'TERRA HOMES O.E.');
  params.set('sid',    Date.now().toString(36));

  const fullUrl = IPODIKSI_FORM_URL + '?' + params.toString();
  window._lastIpodiksiUrl = fullUrl;

  openModal('📲 QR Υπόδειξης Ακινήτου', `
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px;padding:8px 12px;background:var(--gold2);border-radius:var(--r2)">
        📱 Δείξτε το QR στον υποψήφιο πελάτη να το σκανάρει
      </div>
      <div style="display:inline-block;padding:10px;background:#fff;border:2px solid var(--gold);border-radius:10px;margin-bottom:14px" id="qrCodeBox"></div>
      <div style="background:var(--bg2);border-radius:var(--r2);padding:10px 14px;text-align:left;font-size:12px;margin-bottom:14px">
        <div style="font-weight:700;margin-bottom:6px;font-size:13px">${r.periochi||'—'}${r.diefthinsi?' · '+r.diefthinsi:''}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;color:var(--text2)">
          <div>📋 Κωδ: <strong>${r.kwd_akinitou||r.aa||'—'}</strong></div>
          <div>🏠 ${r.eidos||'—'}${r.orofos?' · '+r.orofos:''}</div>
          <div>💶 <strong style="color:var(--gold)">${fmtEuro(r.timi)}</strong></div>
          <div>📐 ${r.emvado_meikto?r.emvado_meikto+' τ.μ.':'—'}</div>
          <div>🏦 Αμοιβή: <strong>${amoiviStr}</strong> (${amoiviPct}%)</div>
          <div>👤 ${agentName||'—'}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-out btn-sm" onclick="downloadIpodiksiQR()" style="flex:1;min-width:100px">⬇️ Download</button>
        <button class="btn btn-out btn-sm" onclick="copyIpodiksiUrl()" style="flex:1;min-width:100px">📋 Αντιγραφή</button>
        <button class="btn btn-out btn-sm" onclick="shareIpodiksi()" style="flex:1;min-width:100px">📤 Κοινοποίηση</button>
      </div>
    </div>
  `, `<button class="btn btn-out btn-sm" onclick="CM()">Κλείσιμο</button>`);

  setTimeout(() => {
    const box = document.getElementById('qrCodeBox');
    if (!box) return;
    box.innerHTML = '';
    function makeQR() {
      if (!window.QRCode) { setTimeout(makeQR, 300); return; }
      try {
        new QRCode(box, {
          text: fullUrl, width: 200, height: 200,
          colorDark: '#1a1a1a', colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
      } catch(e) { box.innerHTML = '<div style="color:red;font-size:12px">Σφάλμα QR</div>'; }
    }
    makeQR();
  }, 200);
}

function euroToWordsGR(n) {
  const ones = ['','ΕΝΑ','ΔΥΟ','ΤΡΙΑ','ΤΕΣΣΕΡΑ','ΠΕΝΤΕ','ΕΞΙ','ΕΠΤΑ','ΟΚΤΩ','ΕΝΝΕΑ',
    'ΔΕΚΑ','ΕΝΤΕΚΑ','ΔΩΔΕΚΑ','ΔΕΚΑΤΡΙΑ','ΔΕΚΑΤΕΣΣΕΡΑ','ΔΕΚΑΠΕΝΤΕ','ΔΕΚΑΕΞΙ',
    'ΔΕΚΑΕΠΤΑ','ΔΕΚΑΟΚΤΩ','ΔΕΚΑΕΝΝΕΑ'];
  const tens = ['','','ΕΙΚΟΣΙ','ΤΡΙΑΝΤΑ','ΣΑΡΑΝΤΑ','ΠΕΝΗΝΤΑ','ΕΞΗΝΤΑ','ΕΒΔΟΜΗΝΤΑ','ΟΓΔΟΝΤΑ','ΕΝΕΝΗΝΤΑ'];
  const hundreds = ['','ΕΚΑΤΟ','ΔΙΑΚΟΣΙΑ','ΤΡΙΑΚΟΣΙΑ','ΤΕΤΡΑΚΟΣΙΑ','ΠΕΝΤΑΚΟΣΙΑ','ΕΞΑΚΟΣΙΑ','ΕΠΤΑΚΟΣΙΑ','ΟΚΤΑΚΟΣΙΑ','ΕΝΝΙΑΚΟΣΙΑ'];
  if (n === 0) return 'ΜΗΔΕΝ';
  let r = '';
  if (n >= 1000) {
    const th = Math.floor(n / 1000);
    if (th === 1) r += 'ΧΙΛΙΑ ';
    else r += (hundreds[Math.floor(th/100)]||'') + ' ' + (tens[Math.floor((th%100)/10)]||'') + ' ' + (ones[th%100<20?th%100:th%10]||'') + ' ΧΙΛΙΑΔΕΣ ';
    n %= 1000;
  }
  if (n >= 100) { r += hundreds[Math.floor(n/100)] + ' '; n %= 100; }
  if (n >= 20)  { r += tens[Math.floor(n/10)] + ' '; n %= 10; }
  if (n > 0)    { r += ones[n] + ' '; }
  return r.trim() + ' ΕΥΡΩ';
}
  function downloadIpodiksiQR() {
  const canvas = document.querySelector('#qrCodeBox canvas');
  if (!canvas) { alert('QR δεν βρέθηκε'); return; }
  const a = document.createElement('a');
  a.download = 'ipodiksi-qr.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function copyIpodiksiUrl(url) {
  const u = url || window._lastIpodiksiUrl;
  if (!u) return;
  navigator.clipboard.writeText(u).then(() => {
    alert('✅ URL αντιγράφηκε!');
  });
}

function shareIpodiksi(url) {
  const u = url || window._lastIpodiksiUrl;
  if (!u) return;
  if (navigator.share) {
    navigator.share({
      title: 'Έντυπο Υπόδειξης Ακινήτου - TERRA HOMES',
      text: 'Παρακαλώ συμπληρώστε το έντυπο υπόδειξης:',
      url: u,
    });
  } else {
    navigator.clipboard.writeText(u);
    alert('✅ URL αντιγράφηκε! Μπορείτε να το στείλετε μέσω Viber/WhatsApp.');
  }
}
