<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerraHomes · Flyer Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --ink:#111111; --cream:#EAE7E1; --cream2:#f3f1ec; --gold:#B89D6F; --gold-lt:#cdb589;
  --white:#fff; --serif:"Fraunces",serif; --serif2:"Fraunces",serif; --sans:"Inter",sans-serif;
  --pbg:#1d1d1f; --pbg2:#262629; --pln:#3a3a3e; --ptx:#e9e9ea; --ptx2:#9a9a9e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:#0e0e0f;color:var(--ptx);height:100vh;overflow:hidden}
.shell{display:flex;height:100vh}

/* ---------- left control panel ---------- */
.panel{width:340px;flex:none;background:var(--pbg);border-right:1px solid var(--pln);
  display:flex;flex-direction:column;height:100vh}
.phead{padding:16px 18px;border-bottom:1px solid var(--pln);display:flex;align-items:center;gap:10px}
.phead .lg{font-family:var(--serif2);font-weight:600;letter-spacing:3px;font-size:15px;color:#fff}
.phead .lg span{color:var(--gold)}
.phead .st{font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-left:auto}
.pbody{flex:1;overflow-y:auto;padding:6px 0}
.pbody::-webkit-scrollbar{width:8px}.pbody::-webkit-scrollbar-thumb{background:var(--pln);border-radius:4px}
.grp{border-bottom:1px solid var(--pln)}
.grp>summary{list-style:none;cursor:pointer;padding:13px 18px;font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--ptx);display:flex;align-items:center;gap:8px;user-select:none}
.grp>summary::-webkit-details-marker{display:none}
.grp>summary .ch{margin-left:auto;color:var(--ptx2);transition:.2s}
.grp[open]>summary .ch{transform:rotate(90deg)}
.grp>summary i{color:var(--gold);font-style:normal}
.gc{padding:4px 18px 16px}
label.fl{display:block;font-size:10px;color:var(--ptx2);margin:10px 0 4px;letter-spacing:.4px}
input.f,select.f,textarea.f{width:100%;background:var(--pbg2);border:1px solid var(--pln);color:var(--ptx);
  border-radius:6px;padding:8px 10px;font-size:12.5px;font-family:var(--sans);outline:none}
input.f:focus,select.f:focus,textarea.f:focus{border-color:var(--gold)}
textarea.f{resize:vertical;min-height:54px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tpl-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.tpl{cursor:pointer;border:1px solid var(--pln);border-radius:8px;padding:8px 4px;text-align:center;background:var(--pbg2);transition:.15s}
.tpl:hover{border-color:var(--gold-lt)}
.tpl.on{border-color:var(--gold);background:rgba(184,157,111,.12)}
.tpl .sw{height:42px;border-radius:4px;margin-bottom:6px;border:1px solid var(--pln)}
.tpl[data-t="noir"] .sw{background:linear-gradient(160deg,#111 60%,#B89D6F 60%)}
.tpl[data-t="lumiere"] .sw{background:linear-gradient(160deg,#EAE7E1 60%,#111 60%)}
.tpl[data-t="galleria"] .sw{background:linear-gradient(160deg,#fbfaf7 55%,#B89D6F 55%)}
.tpl .nm{font-size:10px;letter-spacing:.5px;color:var(--ptx)}
.thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.thumb{position:relative;aspect-ratio:1;border-radius:5px;overflow:hidden;border:1px solid var(--pln);cursor:pointer}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .ov{position:absolute;inset:0;background:rgba(0,0,0,.45);opacity:0;display:flex;
  align-items:center;justify-content:center;gap:4px;transition:.15s}
.thumb:hover .ov{opacity:1}
.thumb .ov button{font-size:8px;padding:3px 5px;border:none;border-radius:3px;background:var(--gold);color:#111;cursor:pointer;font-weight:600}
.thumb.heroOn{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)}
.chiplist{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{display:flex;align-items:center;gap:5px;background:var(--pbg2);border:1px solid var(--pln);
  border-radius:14px;padding:5px 8px 5px 10px;font-size:11px}
.chip button{border:none;background:none;color:var(--ptx2);cursor:pointer;font-size:13px;line-height:1}
.chip button:hover{color:#e8643a}
.btn{display:inline-flex;align-items:center;gap:6px;justify-content:center;cursor:pointer;border:1px solid var(--pln);
  background:var(--pbg2);color:var(--ptx);border-radius:7px;padding:8px 12px;font-size:11px;font-family:var(--sans);transition:.15s}
.btn:hover{border-color:var(--gold-lt)}
.btn.gold{background:var(--gold);color:#111;border-color:var(--gold);font-weight:600}
.btn.gold:hover{background:var(--gold-lt)}
.btn.sm{padding:6px 9px;font-size:10px}
.addrow{display:flex;gap:6px;margin-top:8px}
.pfoot{padding:14px 18px;border-top:1px solid var(--pln);background:var(--pbg)}
.pfoot .exp{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:8px}

/* ---------- stage ---------- */
.stage{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:34px 20px;background:#161617}
.stagewrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.loading{color:var(--ptx2);font-size:13px;margin-top:40px}

/* ============================================================
   SHARED FLYER
   ============================================================ */
.a4{width:600px;aspect-ratio:210/297;overflow:hidden;position:relative;background:#fff;
   box-shadow:0 24px 70px rgba(0,0,0,.6);flex:none}
.ph{position:relative;overflow:hidden}
.ph>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
[contenteditable]{outline:none}
[contenteditable]:hover{box-shadow:inset 0 0 0 1px rgba(184,157,111,.45)}
[contenteditable]:focus{box-shadow:inset 0 0 0 1px var(--gold)}
.cap{font-size:9.5px;letter-spacing:3.5px;text-transform:uppercase}
.logochip{display:inline-flex;align-items:center;border-radius:4px;overflow:hidden}
.logochip img{height:30px;width:auto;display:block}
.logochip.dark{background:#fff;padding:5px 8px;border-radius:4px}
.logochip.light{background:transparent}
.brandlogo img{height:36px;width:auto;display:block}
.lum .foot .brandlogo img,.gall .brandlogo img{height:32px}
.wordmark{font-family:var(--serif2);line-height:1}
.wordmark b{font-weight:600;letter-spacing:5px;font-size:14px;display:block}
.wordmark s{display:block;text-decoration:none;font-size:7px;letter-spacing:5px;margin-top:3px;opacity:.8}
.icn{stroke-width:1.1;fill:none}
.agentcard{display:flex;align-items:center;gap:9px}
.agentcard .av{width:34px;height:34px;border-radius:50%;object-fit:cover;flex:none;border:1px solid var(--gold)}
.agentcard .ai{line-height:1.25}
.agentcard .an{font-size:11px;font-weight:600}
.agentcard .ar{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold)}
.agentcard .aln{display:flex;align-items:center;gap:6px;font-size:9px;color:inherit;margin-top:2px}
.agentcard .aln svg{width:11px;height:11px;stroke:var(--gold);flex:none}
.aphones{display:flex;gap:6px;margin-top:4px}
.aphones a{display:inline-flex;align-items:center;gap:4px;font-size:8px;text-decoration:none;border-radius:10px;padding:3px 8px;background:rgba(184,157,111,.18);color:var(--gold-lt)}
.aphones a svg{width:10px;height:10px;stroke:currentColor;fill:none}
.qr{width:50px;height:50px;flex:none;background:
  repeating-linear-gradient(0deg,#fff 0 3px,#111 3px 6px),
  repeating-linear-gradient(90deg,#fff 0 3px,transparent 3px 6px);border:3px solid #fff}
.btnf{display:inline-block;background:var(--gold);color:#111;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;padding:9px 15px;font-weight:600;width:fit-content}

.stats{display:flex;align-items:center;padding:14px 22px}
.stat{flex:1;display:flex;align-items:center;gap:8px;justify-content:center}
.stat .v{font-family:var(--serif2);font-size:19px;font-weight:600}
.stat .k{font-size:8px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold)}
.stat svg{width:17px;height:17px;stroke:var(--gold)}
.divv{width:1px;height:24px;background:rgba(184,157,111,.3)}
.codebadge{display:inline-flex;flex-direction:column;align-items:flex-end;border:1px solid rgba(184,157,111,.6);border-radius:4px;padding:5px 9px;line-height:1}
.codebadge .cl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.codebadge .cv{font-family:var(--serif2);font-weight:600;font-size:16px;letter-spacing:1px}
.noir .codebadge .cv,.lum .codebadge .cv{color:#fff}
.gall .codebadge .cv{color:#1c1b18}

/* ---- NOIR ---- */
.noir{background:var(--ink);color:#e9e6df;display:flex;flex-direction:column}
.noir .hero{height:45%}
.noir .hero .ov{position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,8,8,.93),rgba(8,8,8,.55) 42%,rgba(8,8,8,.05) 78%)}
.noir .top{position:absolute;top:18px;left:22px;right:22px;display:flex;justify-content:space-between;align-items:flex-start;z-index:3}
.noir .code{color:var(--gold)}
.noir .htxt{position:absolute;left:22px;bottom:20px;z-index:3;right:22px}
.noir .htxt .cap{color:var(--gold)}
.noir .htxt h2{font-family:var(--serif);font-weight:500;font-size:44px;line-height:.96;color:#fff;margin:6px 0 4px}
.noir .htxt .sub{font-family:var(--serif2);font-style:italic;font-size:18px;color:var(--gold-lt)}
.noir .htxt .lf{font-size:9.5px;color:#cdcac3;margin-top:7px}
.noir .stats{background:#161616;border-top:1px solid rgba(184,157,111,.28);border-bottom:1px solid rgba(184,157,111,.28)}
.noir .body{flex:1;display:grid;grid-template-columns:38% 62%;padding:18px 22px}
.sechead{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:9px}
.noir .about p{font-family:var(--serif2);font-size:14px;line-height:1.5;color:#d8d5ce;margin-bottom:8px}
.feat{margin-top:14px;list-style:none}
.noir .feat li{display:flex;align-items:center;gap:8px;font-size:10.5px;color:#d8d5ce;padding:5px 0}
.feat svg{width:14px;height:14px;stroke:var(--gold);flex:none}
.gal{padding-left:16px;display:grid;grid-template-rows:1.5fr 1fr;gap:6px}
.gal .row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.gal .ph{border:1px solid rgba(184,157,111,.25)}
.noir .foot{background:#0c0c0c;padding:15px 22px;border-top:1px solid rgba(184,157,111,.28);
  display:grid;grid-template-columns:1fr 1.1fr;gap:16px}
.noir .map{background:#161616;border:1px solid rgba(184,157,111,.25);position:relative;
  display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:118px}
.mapgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(184,157,111,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(184,157,111,.12) 1px,transparent 1px);background-size:20px 20px}
.mappin{position:relative;z-index:2;text-align:center;padding:8px}
.mappin svg{width:20px;height:20px;stroke:var(--gold);fill:none}
.mappin .nm{font-size:9.5px;letter-spacing:2px;color:#e9e6df;text-transform:uppercase;margin-top:4px}
.mappin .ad{font-size:8px;color:#9a9893;margin-top:2px;letter-spacing:.5px}
.noir .cta{display:flex;flex-direction:column;justify-content:space-between}
.noir .big-q{font-family:var(--serif2);font-style:italic;font-size:19px;color:var(--gold-lt);line-height:1.15}
.noir .price{font-family:var(--serif);font-size:23px;color:#fff;margin:6px 0}
.noir .price small{font-size:11px;color:var(--gold);font-family:var(--sans);letter-spacing:1px}
.noir .ctarow{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
.contact{display:flex;flex-direction:column;gap:4px}
.contact div{display:flex;align-items:center;gap:7px;font-size:9px;color:#cdcac3}
.contact svg{width:12px;height:12px;stroke:var(--gold)}
.footbar{grid-column:1/3;display:flex;align-items:center;justify-content:space-between;
  margin-top:13px;padding-top:12px;border-top:1px solid rgba(184,157,111,.2)}

/* ---- LUMIERE ---- */
.lum{background:var(--cream);color:#26241f;display:flex;flex-direction:column}
.lum .hero{height:41%}
.lum .hero .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,14,12,.55),rgba(15,14,12,.12) 45%,rgba(15,14,12,.6))}
.lum .top{position:absolute;top:18px;left:24px;right:24px;z-index:3;color:#fff;display:flex;justify-content:space-between;align-items:flex-start}
.lum .code{color:var(--gold-lt)}
.lum .htxt{position:absolute;left:24px;bottom:22px;z-index:3;right:24px}
.lum .htxt .cap{color:var(--gold-lt)}
.lum .htxt h2{font-family:var(--serif);font-weight:500;font-size:42px;line-height:.95;color:#fff;margin:6px 0 5px}
.lum .htxt .sub{font-family:var(--serif2);font-style:italic;font-size:17px;color:#efe9dd}
.lum .stats{background:var(--cream2);border-top:1px solid rgba(120,100,70,.22);border-bottom:1px solid rgba(120,100,70,.22)}
.lum .stat .v{color:#26241f}.lum .stat .k{color:#9a7a47}.lum .stat svg{stroke:#3a342a}.lum .divv{background:rgba(120,100,70,.22)}
.lum .body{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:20px 24px}
.lum .sechead{color:#9a7a47}
.lum .about h3{font-family:var(--serif);font-size:16px;color:#26241f;margin-bottom:7px;font-weight:500}
.lum .about p{font-family:var(--serif2);font-size:14px;line-height:1.55;color:#4a4640;margin-bottom:8px}
.lum .feat li{display:flex;align-items:center;gap:9px;font-size:11px;color:#3a352d;padding:6px 0;border-bottom:1px solid rgba(120,100,70,.14)}
.lum .feat svg{stroke:#9a7a47}
.lum .foot{background:var(--ink);color:#e9e6df;padding:16px 24px;display:flex;align-items:center;gap:16px}
.lum .foot .q{font-family:var(--serif2);font-style:italic;font-size:19px;color:var(--gold-lt);line-height:1.15;flex:1}
.lum .foot .q .price{display:block;font-family:var(--serif);font-style:normal;font-size:20px;color:#fff;margin-top:7px}
.lum .foot .right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.lum .foot .contact div{color:#cdcac3}

/* ---- GALLERIA ---- */
.gall{background:#fbfaf7;color:#1c1b18;display:flex;flex-direction:column;padding:24px}
.gall .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.gall .code{font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;text-align:right;line-height:1.5}
.gall .hero{height:33%;margin-bottom:14px}
.gall .hero .frame{position:absolute;inset:8px;border:1px solid rgba(255,255,255,.6);z-index:2}
.gall .hero .cap{position:absolute;left:16px;bottom:14px;color:#fff;letter-spacing:4px;z-index:3}
.gall .hero .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.45))}
.gall .head{display:grid;grid-template-columns:1fr auto;align-items:end;gap:16px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(120,100,70,.25)}
.gall .head h2{font-family:var(--serif);font-weight:500;font-size:38px;line-height:.92}
.gall .head h2 .it{display:block;font-style:italic;font-family:var(--serif2);font-size:21px;color:var(--gold);font-weight:500}
.gall .head .pr{text-align:right}.gall .head .pr .v{font-family:var(--serif);font-size:27px;line-height:1}
.gall .head .pr .k{font-size:8px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-top:4px}
.gall .midline{display:flex;margin-bottom:14px}
.gall .midline .s{flex:1;text-align:center;border-right:1px solid rgba(120,100,70,.2)}
.gall .midline .s:last-child{border:none}
.gall .midline .v{font-family:var(--serif2);font-size:17px;font-weight:600}
.gall .midline .k{font-size:7px;letter-spacing:1.3px;color:#9a7a47;text-transform:uppercase}
.gall .grid{flex:1;display:grid;grid-template-columns:1.4fr 1fr;grid-template-rows:1fr 1fr;gap:7px;margin-bottom:14px}
.gall .grid .ph{border:1px solid rgba(120,100,70,.18)}.gall .grid .a{grid-row:1/3}
.gall .info{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start;margin-bottom:12px}
.gall .sechead{color:#9a7a47}
.gall .info p{font-family:var(--serif2);font-size:13px;line-height:1.5;color:#46423a}
.gall .loc div{display:flex;gap:7px;font-size:10px;color:#3a352d;padding:4px 0}
.gall .loc svg{width:13px;height:13px;stroke:var(--gold);flex:none}
.gall .gfoot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:auto;padding-top:12px;border-top:1px solid rgba(120,100,70,.25)}
.gall .gfoot .q{font-family:var(--serif2);font-style:italic;font-size:16px;color:#1c1b18}
.gall .qr{border-color:#1c1b18;background:repeating-linear-gradient(0deg,#fbfaf7 0 3px,#1c1b18 3px 6px),repeating-linear-gradient(90deg,#fbfaf7 0 3px,transparent 3px 6px)}
.gall .agentcard .ar{color:#9a7a47}.gall .aphones a{color:#7a5f33;background:rgba(184,157,111,.22)}
/* ---------- zoom control ---------- */
.zoomctl{position:fixed;right:16px;bottom:18px;z-index:58;display:flex;align-items:center;gap:2px;
  background:var(--pbg2);border:1px solid var(--pln);border-radius:24px;padding:4px;
  box-shadow:0 8px 24px rgba(0,0,0,.4)}
.zoomctl button{width:34px;height:34px;border:none;background:none;color:var(--ptx);font-size:18px;
  cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:1}
.zoomctl button:hover{background:var(--pln)}
.zoomctl .zlv{font-size:11px;color:var(--ptx2);min-width:40px;text-align:center}

/* ---------- mobile ---------- */
.phandle{display:none}
.mtoggle,.mback{display:none}
@media (max-width:860px){
  .shell{flex-direction:column}
  .stage{padding:14px 10px 86px;min-height:100vh;align-items:flex-start}
  .stagewrap{width:100%}
  #flyer{width:100%}
  .a4{box-shadow:0 14px 40px rgba(0,0,0,.5)}
  .panel{position:fixed;left:0;right:0;bottom:0;top:auto;width:100%;height:84vh;
    border-right:none;border-top:1px solid var(--pln);border-radius:16px 16px 0 0;
    transform:translateY(103%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:60;box-shadow:0 -12px 44px rgba(0,0,0,.55)}
  .panel.open{transform:translateY(0)}
  .phandle{display:block;width:42px;height:5px;border-radius:3px;background:var(--pln);
    margin:9px auto 3px;cursor:pointer;flex:none}
  .phead{padding-top:6px}
  .mback{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55;
    opacity:0;pointer-events:none;transition:opacity .25s}
  .mback.open{opacity:1;pointer-events:auto}
  .mtoggle{display:inline-flex;position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:58;
    align-items:center;gap:8px;background:var(--gold);color:#111;border:none;border-radius:30px;
    padding:13px 24px;font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:.3px;
    box-shadow:0 10px 28px rgba(0,0,0,.45);cursor:pointer}
}
</style>
</head>
<body>
<div id="loginGate" style="position:fixed;inset:0;z-index:999;background:#0e0e0f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="font-family:var(--serif2);font-weight:600;letter-spacing:4px;font-size:20px;color:#fff">TERRA<span style="color:var(--gold)">&amp;</span>HOMES</div>
  <div style="font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:6px">Flyer Studio</div>
  <input class="f" id="lgEmail" placeholder="email" style="width:260px" autocomplete="username">

// ---------- load ----------
async function boot(){
  const [me,cp,us,ak]=await Promise.all([
    SB.auth.getUser(),
    SB.from('company_profile').select('*').limit(1).maybeSingle(),
    SB.from('users').select('id,auth_id,name,email,phone,role,photo_url,active').eq('active',true),
    SB.from('akinita').select('id,user_id,kwd_akinitou,periochi,eidos,timi,mode').order('created_at',{ascending:false}).limit(300)
  ]);
  COMPANY=cp.data||{}; USERS=us.data||[];
  const au=me&&me.data?me.data.user:null;
  ME = USERS.find(u=>au&&u.auth_id===au.id)
    || USERS.find(u=>au&&au.email&&u.email&&u.email.toLowerCase()===au.email.toLowerCase()) || null;
  const all=ak.data||[];
  PROPS = (ME && ME.role!=='admin') ? all.filter(p=>p.user_id===ME.id) : all;
  const ps=$('#propSel'); ps.innerHTML='';
  if(!PROPS.length){ const o=document.createElement('option'); o.textContent='— Δεν υπάρχουν ακίνητα —'; ps.appendChild(o); }
  PROPS.forEach(p=>{ const o=document.createElement('option'); o.value=p.id;
    o.textContent=`${p.periochi||'—'} · ${p.eidos||''} · ${p.timi?fmt(p.timi)+'€':''}`; ps.appendChild(o); });
  if(ME) setAgent(ME);
  if(PROPS[0]) loadProperty(PROPS[0].id);
}

async function loadProperty(id){
  const {data:p}=await SB.from('akinita').select('*').eq('id',id).single();
  S.prop=p; deriveDefaults(p); fillPanel(); render();
}

function deriveDefaults(p){
  const en=S.lang==='en';
  const fl=(p.orofos||'').replace(/[^0-9]/g,'');
  const furn = /ΕΠΙΠΛ/i.test(p.parat_akin||p.simeiosis||'');
  const typeEN=EIDOS_MAP[p.eidos]||p.eidos||'Residence';
  S.code = p.kwd_akinitou || ('TH-'+(p.aa||(p.id?p.id.slice(0,4):'')));
  S.cap = (p.periochi||'').toUpperCase();
  S.head = en ? typeEN : (p.eidos||'Ακίνητο');
  S.sub = en ? (fl?`${fl}${ord(fl)} floor`:'City residence') : (p.orofos?`${p.orofos} όροφος`:(p.eidos||''));
  S.sub2 = en ? 'Living in the heart of the city' : 'Διαμονή στην καρδιά της πόλης';
  S.lifestyle = en ? 'Designed for quality living' : 'Διαμονή σχεδιασμένη για ποιότητα ζωής';
  S.about = en
    ? `${typeEN} in ${p.periochi||''}${fl?`, on the ${fl}${ord(fl)} floor`:''}. `+(furn?'Fully furnished and move-in ready — ideal as a home or investment.':'Ideal as a home or investment.')
    : `${p.eidos||'Ακίνητο'} στην περιοχή ${p.periochi||''}${p.orofos?`, στον ${p.orofos} όροφο`:''}. `+(furn?'Επιπλωμένο και έτοιμο για διαμονή — ιδανικό για κατοικία ή επένδυση.':'Ιδανικό για κατοικία ή επένδυση.');
  S.priceLabel = en ? (p.mode==='rent'?'Monthly rent':'Asking price') : (p.mode==='rent'?'Μηνιαίο μίσθωμα':'Τιμή πώλησης');
  S.price = p.timi ? fmt(p.timi)+' €'+(p.mode==='rent'?(en?' /mo':' /μήνα'):'') : '';
  S.cta = en ? 'Schedule a private viewing.' : 'Κλείστε ιδιωτική επίσκεψη.';
  S.cta2 = en ? 'Schedule a Private Viewing' : 'Κλείστε Ιδιωτική Επίσκεψη';
  // stats
  const st=[];
  if(p.emvado_meikto) st.push({v:fmt(p.emvado_meikto),k:t('sqm'),i:IC.sqm});
  if(p.domatia) st.push({v:p.domatia,k:t('rooms'),i:IC.room});
  if(p.orofos) st.push({v:p.orofos,k:t('floor'),i:IC.floor});
  if(p.etos_kataskeyis) st.push({v:p.etos_kataskeyis,k:t('year'),i:IC.year});
  if(p.asanser && /ναι|yes/i.test(p.asanser)) st.push({v:en?'Yes':'Ναι',k:t('lift'),i:IC.lift});
  if(p.thesi_stathmeysis) st.push({v:en?'Yes':'Ναι',k:t('park'),i:IC.park});
  if(p.pea) st.push({v:p.pea,k:t('energy'),i:IC.energy});
  S.stats=st;
  // features (bilingual)
  const ff=[];
  if(furn) ff.push(['Επιπλωμένο','Fully furnished',IC.furn]);
  if(/ΗΛΕΚΤΡΙΚ|ΣΥΣΚΕΥ/i.test(p.parat_akin||p.simeiosis||'')) ff.push(['Ηλεκτρικές συσκευές','Appliances included',IC.appl]);
  if(p.asanser && /ναι|yes/i.test(p.asanser)) ff.push(['Ασανσέρ','Elevator',IC.lift]);
  if(p.apothiki) ff.push(['Αποθήκη','Storage room',IC.store]);
  if(p.thesi_stathmeysis) ff.push(['Θέση στάθμευσης','Parking space',IC.park]);
  if(p.etos_anakainisis) ff.push(['Ανακαινισμένο '+p.etos_anakainisis,'Renovated '+p.etos_anakainisis,IC.check]);
  if(p.orofos && /[4-9]|ρετιρ/i.test(p.orofos)) ff.push(['Θέα από ψηλά','Elevated views',IC.view]);
  ff.push(['Επενδυτική ευκαιρία','Investment opportunity',IC.invest]);
  S.features = ff.slice(0,6).map(x=>({t:en?x[1]:x[0],i:x[2]}));
  // location (bilingual)
  const lc=[ [`${p.periochi||''} · κεντρική τοποθεσία`,`${p.periochi||''} · central location`,IC.pin],
             ['Περιπατητική απόσταση παντού','Everything within walking distance',IC.check],
             ['Υψηλό potential βραχυχρόνιας μίσθωσης','High short-term rental potential',IC.invest] ];
  S.loc = lc.map(x=>({t:en?x[1]:x[0],i:x[2]}));
  // photos
  S.allPhotos = Array.isArray(p.photos)?p.photos.filter(Boolean):[];
  S.hero = S.allPhotos[0]||'';
  S.gallery = S.allPhotos.slice(1,5);
  // agent: παραμένει ο συνδεδεμένος χρήστης (ορίζεται στο boot)
}
function setAgent(u){
  S.agent={ name:u.name||'', role:u.role||'Σύμβουλος Ακινήτων', phone:u.phone||'', email:u.email||'',
            wa:u.phone||'', vi:u.phone||'', photo:u.photo_url||'' };
}

// ---------- panel sync ----------
function fillPanel(){
  $('#langSel').value=S.lang;
  $('#fCode').value=S.code; $('#fCap').value=S.cap; $('#fHead').value=S.head;
  $('#fSub').value=S.sub; $('#fAbout').value=S.about; $('#fCta').value=S.cta;
  $('#aName').value=S.agent.name; $('#aPhone').value=S.agent.phone; $('#aEmail').value=S.agent.email;
  $('#aWa').value=S.agent.wa; $('#aVi').value=S.agent.vi;
  renderFeatChips(); renderThumbs();
}
function renderFeatChips(){
  $('#featList').innerHTML=S.features.map((f,i)=>
    `<span class="chip">${esc(f.t)}<button data-i="${i}">×</button></span>`).join('');
  $('#featList').querySelectorAll('button').forEach(b=>b.onclick=()=>{S.features.splice(+b.dataset.i,1);renderFeatChips();render();});
}
function renderThumbs(){
  $('#thumbs').innerHTML=S.allPhotos.map((u,i)=>
    `<div class="thumb ${u===S.hero?'heroOn':''}" data-u="${esc(u)}">
       <img src="${esc(u)}" crossorigin="anonymous">
       <div class="ov"><button data-a="hero">✦</button><button data-a="gal">+</button></div>
     </div>`).join('');
  $('#thumbs').querySelectorAll('.thumb').forEach(t=>{
    const u=t.dataset.u;
    t.querySelector('[data-a="hero"]').onclick=()=>{S.hero=u;renderThumbs();render();};
    t.querySelector('[data-a="gal"]').onclick=()=>{ if(!S.gallery.includes(u)) S.gallery.push(u); if(S.gallery.length>5)S.gallery.shift(); render();};
  });
}

function ph(url,cls=''){ return `<div class="ph ${cls}">${url?`<img src="${esc(url)}" crossorigin="anonymous">`:''}</div>`; }
function ce(k,v,tag='span',extra=''){ return `<${tag} contenteditable data-k="${k}" ${extra}>${esc(v)}</${tag}>`; }

function render(){
  const el=$('#flyer'); el.innerHTML=({noir:noir,lumiere:lumiere,galleria:galleria}[S.template])();
  el.querySelectorAll('[contenteditable]').forEach(n=>{
    n.addEventListener('input',()=>setK(n.dataset.k,n.innerText));
  });
  fitFlyer();
}
let userZoom=1;
function fitFlyer(){
  const wrap=$('#flyer'); if(!wrap) return;
  const a4=wrap.querySelector('.a4');
  if(!a4){ wrap.style.height=''; wrap.style.width=''; return; }
  const mobile=window.innerWidth<=860;
  const stage=document.querySelector('.stage');
  const avail=((stage?stage.clientWidth:wrap.clientWidth)||600)-(mobile?20:40);
  const base=mobile?Math.min(1, avail/600):1;
  const scale=Math.max(0.2, base*userZoom);
  a4.style.transformOrigin='top left';
  a4.style.transform='scale('+scale+')';
  wrap.style.width=(600*scale)+'px';
  wrap.style.height=(600*297/210*scale)+'px';
  wrap.style.overflow='hidden';
  const z=$('#zLvl'); if(z) z.textContent=Math.round(userZoom*100)+'%';
}
function setZoom(z){ userZoom=Math.min(3, Math.max(0.4, z)); fitFlyer(); }
function mPanel(open){
  const p=document.querySelector('.panel'), b=$('#mBack'), t=$('#mToggle');
  if(!p) return;
  p.classList.toggle('open',open); if(b) b.classList.toggle('open',open);
  if(t) t.textContent = open ? '👁 Προβολή flyer' : '🎨 Επεξεργασία';
}
function setK(k,val){
  if(k.startsWith('features.')){ const i=+k.split('.')[1]; if(S.features[i]) S.features[i].t=val; return; }
  S[k]=val;
}

// ---------- panel events ----------
function bind(){
  $('#propSel').onchange=e=>loadProperty(e.target.value);
  $('#tplPick').onclick=e=>{const t=e.target.closest('.tpl');if(!t)return;
    document.querySelectorAll('.tpl').forEach(x=>x.classList.toggle('on',x===t));S.template=t.dataset.t;render();};
  const map={fCode:'code',fCap:'cap',fHead:'head',fSub:'sub',fAbout:'about',fCta:'cta'};
  Object.entries(map).forEach(([id,k])=>$('#'+id).oninput=e=>{ S[k]=e.target.value; const n=document.querySelector('#flyer [data-k="'+k+'"]'); if(n){ n.innerText=e.target.value; } else { render(); } });
  const am={aName:'name',aPhone:'phone',aEmail:'email',aWa:'wa',aVi:'vi'};
  Object.entries(am).forEach(([id,k])=>$('#'+id).oninput=e=>{S.agent[k]=e.target.value;render();});
  $('#langSel').onchange=e=>{S.lang=e.target.value; if(S.prop){deriveDefaults(S.prop);fillPanel();} render();};
  $('#featAdd').onclick=()=>{const v=$('#featNew').value.trim();if(v){S.features.push({t:v,i:IC.check});$('#featNew').value='';renderFeatChips();render();}};
  $('#imgPick').onclick=()=>$('#imgFile').click();
  $('#imgFile').onchange=e=>{
    const files=[...e.target.files]; if(!files.length) return;
    let first=null, pending=files.length;
    files.forEach(f=>{ const r=new FileReader();
      r.onload=()=>{ S.allPhotos.push(r.result); if(!first) first=r.result;
        if(--pending===0){ S.hero=first; renderThumbs(); render(); } };
      r.readAsDataURL(f); });
    e.target.value='';
  };
  $('#expPdf').onclick=()=>exportPDF();
  $('#expPng').onclick=()=>exportImg('png');
  $('#expJpg').onclick=()=>exportImg('jpg');
  // mobile bottom-sheet
  const mt=$('#mToggle'); if(mt) mt.onclick=()=>mPanel(!document.querySelector('.panel').classList.contains('open'));
  const mb=$('#mBack'); if(mb) mb.onclick=()=>mPanel(false);
  const ph=$('#pHandle'); if(ph) ph.onclick=()=>mPanel(false);
  let rz; window.addEventListener('resize',()=>{ clearTimeout(rz); rz=setTimeout(fitFlyer,150); });
  window.addEventListener('orientationchange',()=>setTimeout(fitFlyer,300));
  const zi=$('#zIn'),zo=$('#zOut'),zf=$('#zFit');
  if(zi) zi.onclick=()=>setZoom(userZoom*1.2);
  if(zo) zo.onclick=()=>setZoom(userZoom/1.2);
  if(zf) zf.onclick=()=>setZoom(1);
  // pinch-zoom (όπως iOS)
  const stg=document.querySelector('.stage');
  if(stg){
    let pStart=0, zBase=1;
    const tdist=t=>Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
    stg.addEventListener('touchstart',e=>{ if(e.touches.length===2){ pStart=tdist(e.touches); zBase=userZoom; } },{passive:true});
    stg.addEventListener('touchmove',e=>{ if(e.touches.length===2 && pStart){ e.preventDefault(); setZoom(zBase*(tdist(e.touches)/pStart)); } },{passive:false});
    stg.addEventListener('touchend',e=>{ if(e.touches.length<2) pStart=0; },{passive:true});
    stg.addEventListener('gesturestart',e=>{ e.preventDefault(); zBase=userZoom; },{passive:false});
    stg.addEventListener('gesturechange',e=>{ e.preventDefault(); setZoom(zBase*e.scale); },{passive:false});
  }
}

// ---------- export ----------
async function capture(){
  const node=$('#flyer .a4'); const wrap=$('#flyer');
  const pt=node.style.transform, po=node.style.transformOrigin, ph=wrap.style.height, pw=wrap.style.width, pov=wrap.style.overflow;
  node.style.transform='none'; node.style.transformOrigin='';
  wrap.style.height=''; wrap.style.width=''; wrap.style.overflow='';
  const c = await html2canvas(node,{scale:3,useCORS:true,backgroundColor:null,logging:false});
  node.style.transform=pt; node.style.transformOrigin=po; wrap.style.height=ph; wrap.style.width=pw; wrap.style.overflow=pov;
  return c;
}
async function exportImg(type){
  const c=await capture();
  const mime=type==='jpg'?'image/jpeg':'image/png';
  const a=document.createElement('a');
  a.href=c.toDataURL(mime,0.95); a.download=`TerraHomes_${S.code||'flyer'}.${type}`; a.click();
}
async function exportPDF(){
  const c=await capture();
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF('p','mm','a4');
  pdf.addImage(c.toDataURL('image/jpeg',0.95),'JPEG',0,0,210,297);
  pdf.save(`TerraHomes_${S.code||'flyer'}.pdf`);
}

// ---------- auth gate ----------
async function init(){
  const {data:{session}}=await SB.auth.getSession();
  if(session){ startApp(); } // ήδη συνδεδεμένος (π.χ. μέσα στο CRM)
}
function startApp(){ const g=$('#loginGate'); if(g) g.style.display='none'; bind(); boot(); }
async function doLogin(){
  const email=$('#lgEmail').value.trim(), pass=$('#lgPass').value;
  $('#lgErr').textContent='';
  const {error}=await SB.auth.signInWithPassword({email,password:pass});
  if(error){ $('#lgErr').textContent='Λάθος στοιχεία ή σφάλμα σύνδεσης.'; return; }
  startApp();
}
$('#lgBtn').onclick=doLogin;
$('#lgPass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
init();
</script>
